<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Claim-Ablation Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#faf6f1; --panel:#fffdf9; --panel2:#f5f0e8; --ink:#2c2416; --ink2:#1a1408;
    --mut:#6b5d4d; --line:#e8e0d4; --line2:#ddd5c8;
    --green:#4a7c59; --green-d:#3d6648; --amber:#b45309; --red:#a65d57; --red-d:#8b4d48;
    --blue:#3f6f8f;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--ink); padding:22px 28px;
    font-family:'EB Garamond',Georgia,'Times New Roman',serif; font-size:15px; line-height:1.5;}
  .container{max-width:1280px; margin:0 auto;}
  header.top{margin-bottom:18px; display:flex; justify-content:space-between; align-items:flex-end; gap:16px; flex-wrap:wrap;}
  header.top h1{font-size:1.7rem; font-weight:500; letter-spacing:-0.02em; color:var(--ink2); margin:0 0 2px;}
  header.top .sub{color:var(--mut); font-style:italic; font-size:0.95rem;}
  .crumbs{font-size:0.9rem; color:var(--mut);}
  .crumbs a{color:var(--green); text-decoration:none;} .crumbs a:hover{text-decoration:underline;}

  .panel{background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:16px;
    box-shadow:0 2px 6px rgba(44,36,22,.05); margin-bottom:16px;}
  .panel h2{font-size:1.1rem; font-weight:600; color:var(--ink); margin:0 0 12px;
    display:flex; align-items:baseline; gap:8px;}
  .panel h2 .num{color:var(--green); font-weight:600;}
  .panel h2 .sub2{color:var(--mut); font-weight:400; font-style:italic; font-size:0.85rem;}

  .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  .muted{color:var(--mut);} .sep{height:1px; background:var(--line); margin:16px 0;}
  a{color:var(--green);}
  code{font-family:ui-monospace,Menlo,Consolas,monospace; font-size:0.82em;
    background:var(--panel2); padding:1px 5px; border-radius:3px;}
  button{cursor:pointer; padding:6px 14px; border:1px solid var(--line2); border-radius:4px;
    background:var(--panel); color:var(--ink); font-family:inherit; font-size:0.9rem; font-weight:500; transition:all .2s;}
  button:hover:not(:disabled){background:var(--panel2); border-color:#a89880;}
  button.primary{background:var(--green); color:#fff; border-color:var(--green-d);}
  button.sm{padding:3px 9px; font-size:0.8rem;}

  .kv{display:flex; gap:16px; flex-wrap:wrap; font-size:0.85rem; color:var(--mut); margin-top:10px;}
  .kv b{color:var(--ink); font-weight:600;}
  .kv .k{display:flex; flex-direction:column; gap:1px;}
  .kv .k small{font-size:0.72rem; font-style:italic;}

  .pill{display:inline-block; padding:3px 11px; border-radius:999px; font-size:0.8rem;
    border:1px solid var(--line2); color:var(--mut); background:var(--panel2); font-weight:600;}
  .pill.run{color:#fff; background:var(--blue); border-color:#345b75;}
  .pill.done{color:#fff; background:var(--green); border-color:var(--green-d);}
  .pill.failed{color:#fff; background:var(--red); border-color:var(--red-d);}
  .pill.mock{color:var(--amber); background:#fdf0e6; border-color:#f0d8c0;}

  /* metrics */
  .scoregrid{display:flex; gap:30px; align-items:flex-end; margin-top:4px; flex-wrap:wrap;}
  .metric{font-size:2.1rem; font-weight:600; color:var(--ink2); line-height:1; font-variant-numeric:tabular-nums;}
  .metric small{display:block; font-size:0.7rem; color:var(--mut); font-weight:400; font-style:italic;
    font-variant-numeric:normal; margin-top:4px;}
  .metric.green{color:var(--green-d);} .metric.red{color:var(--red-d);} .metric.blue{color:var(--blue);}

  /* progress */
  .bar{height:10px; background:var(--panel2); border:1px solid var(--line2); border-radius:999px; overflow:hidden;}
  .bar > div{height:100%; background:var(--green); transition:width .4s;}
  .bar.run > div{background:var(--blue);}

  /* run cards (experimental map) */
  .runs{display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:13px;}
  .runcard{display:block; text-decoration:none; color:inherit; background:var(--panel);
    border:1px solid var(--line); border-radius:7px; padding:14px 15px; transition:all .15s;}
  .runcard:hover{border-color:var(--green); box-shadow:0 3px 10px rgba(44,36,22,.08);}
  .runcard.oldtoggle{cursor:pointer; border-style:dashed; border-color:var(--line2); background:var(--panel2);}
  .runcard.oldtoggle .title{color:var(--mut);}
  .oldwrap{margin-top:16px; border-top:1px dashed var(--line2); padding-top:14px;}
  .oldhead{font-weight:600; color:var(--ink2); margin:2px 2px 12px; font-size:1.02rem;}
  .runcard .h{display:flex; justify-content:space-between; align-items:baseline; gap:8px;}
  .runcard .title{font-weight:600; color:var(--ink2); font-size:1.02rem;}
  .runcard .id{font-family:ui-monospace,Menlo,Consolas,monospace; font-size:0.7rem; color:var(--mut); word-break:break-all;}
  .runcard .big{font-size:1.7rem; font-weight:600; color:var(--green-d); font-variant-numeric:tabular-nums; margin-top:8px;}
  .runcard .big small{font-size:0.66rem; color:var(--mut); font-style:italic; font-weight:400;}

  /* activation grid */
  .acts{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px;}
  .actcard{text-decoration:none; color:inherit; background:var(--panel); border:1px solid var(--line);
    border-radius:6px; padding:11px 12px; transition:all .15s;}
  .actcard:hover{border-color:var(--green); box-shadow:0 2px 8px rgba(44,36,22,.07);}
  .actcard .top{display:flex; justify-content:space-between; font-size:0.78rem; color:var(--mut);}
  .actcard .tok{font-family:ui-monospace,Menlo,Consolas,monospace; background:var(--panel2);
    padding:1px 5px; border-radius:3px; color:var(--ink2);}
  .actcard .chips{display:flex; gap:3px; margin-top:8px; flex-wrap:wrap;}
  .chip{width:13px; height:13px; border-radius:3px; display:inline-block;}
  .chip.g{background:var(--green);} .chip.e{background:var(--amber);} .chip.c{background:var(--red);} .chip.u{background:var(--line2);}
  .actcard .ex{font-size:0.82rem; color:var(--ink); margin-top:8px; line-height:1.4;
    max-height:3.3em; overflow:hidden;}

  /* snippet verdict blocks */
  .snip{border:1px solid var(--line); border-radius:7px; padding:14px 16px; margin:12px 0; background:var(--panel);}
  .snip.grounded{border-left:4px solid var(--green);}
  .snip.entangled{border-left:4px solid var(--amber);}
  .snip.confabulated{border-left:4px solid var(--red);}
  .snip.unlocated{border-left:4px solid var(--line2);}
  .snip .claim{font-size:1.04rem; color:var(--ink2); margin:0 0 4px;}
  .vbadge{padding:3px 11px; border-radius:999px; font-size:0.76rem; font-weight:700; white-space:nowrap;}
  .vbadge.grounded{background:var(--green); color:#fff;}
  .vbadge.entangled{background:var(--amber); color:#fff;}
  .vbadge.confabulated{background:var(--red); color:#fff;}
  .vbadge.unlocated{background:var(--panel2); color:var(--mut); border:1px solid var(--line2);}
  .interp{font-size:0.93rem; color:var(--ink); margin:8px 0; max-width:80ch; font-style:italic;}
  .statline{display:flex; gap:20px; flex-wrap:wrap; font-size:0.82rem; color:var(--mut); margin-top:6px; font-variant-numeric:tabular-nums;}
  .statline b{color:var(--ink2); font-weight:600;}

  /* explanation prose with colored snippets */
  .out{white-space:pre-wrap; font-family:inherit; font-size:0.98rem; line-height:1.65;
    background:var(--panel2); border:1px solid var(--line); border-radius:6px; padding:13px 15px; margin-top:10px;}
  .mark-g{background:#e2efe2; border-bottom:2px solid var(--green); border-radius:2px; padding:0 2px;}
  .mark-e{background:#fbeed9; border-bottom:2px solid var(--amber); border-radius:2px; padding:0 2px;}
  .mark-c{background:#f6e3e1; border-bottom:2px solid var(--red); border-radius:2px; padding:0 2px;}
  .mark-u{background:var(--panel); border-bottom:2px dotted var(--line2); padding:0 2px;}

  /* source text */
  .src{font-size:0.92rem; line-height:1.6; background:var(--panel2); border:1px solid var(--line);
    border-radius:6px; padding:13px 15px; max-height:230px; overflow:auto; white-space:pre-wrap;}
  .readtok{background:var(--green); color:#fff; padding:0 4px; border-radius:3px; font-weight:600;}

  svg{display:block;} .chartwrap{margin:8px 0;}
  .axis{stroke:var(--line2); stroke-width:1;} .axislbl{fill:var(--mut); font-size:9px;}
  .gridln{stroke:var(--line); stroke-width:1;}

  table.mat{border-collapse:collapse; font-size:0.74rem;} table.mat td{border:1px solid var(--line);
    width:30px; height:26px; text-align:center; font-variant-numeric:tabular-nums; color:var(--ink2);}
  table.mat th{font-size:0.68rem; color:var(--mut); font-weight:600; padding:2px 4px;}

  /* docs */
  .docs{margin-top:26px; border-top:2px solid var(--line2); padding-top:6px;}
  .docs h2.section{font-size:1.4rem; font-weight:600; color:var(--ink2); letter-spacing:-0.02em; margin:24px 0 4px;}
  .docs h3{font-size:1.1rem; font-weight:600; color:var(--ink); margin:20px 0 8px; padding-bottom:5px; border-bottom:1px solid var(--line);}
  .docs p{margin:9px 0; color:var(--ink);}
  .docs p.lead{font-size:1.05rem; color:var(--ink2);}
  .docs ul{margin:8px 0 12px; padding-left:22px;} .docs li{margin:5px 0;}
  .docs b{color:var(--ink2);} .docs em{color:var(--ink2);}
  .formula{font-family:ui-monospace,Menlo,Consolas,monospace; font-size:0.83rem; background:var(--panel2);
    border:1px solid var(--line); border-left:3px solid var(--green); border-radius:4px;
    padding:11px 14px; margin:11px 0; line-height:1.8; overflow-x:auto; color:var(--ink2); max-width:82ch;
    white-space:pre; tab-size:2;}
  .exclaims{list-style:none; margin:10px 0; padding:0; max-width:86ch;}
  .exclaims li{margin:7px 0; padding-left:2px; line-height:1.5;}
  .exclaims .vbadge{margin-right:8px;}
  .note{background:var(--panel2); border:1px solid var(--line); border-left:3px solid var(--amber);
    border-radius:4px; padding:11px 14px; margin:14px 0; font-size:0.9rem; max-width:82ch;}
  .steps{margin:14px 0;} .step{position:relative; padding:11px 15px 11px 50px; margin:9px 0;
    background:var(--panel); border:1px solid var(--line); border-radius:6px; counter-increment:step;}
  .steps{counter-reset:step;}
  .step::before{content:counter(step); position:absolute; left:12px; top:11px; width:26px; height:26px;
    background:var(--green); color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.85rem; font-weight:600;}
  .step h4{margin:0 0 3px; color:var(--ink2);} .step.halt{border-left:3px solid var(--red);}
  .docs h4.docsub{font-size:1rem; font-weight:600; color:var(--ink2); margin:22px 0 4px;
    letter-spacing:-0.01em; padding-bottom:3px; border-bottom:1px dashed var(--line);}
  .step .ex{display:block; margin-top:6px; padding:6px 10px; border-left:2px solid var(--line2);
    background:var(--panel2); border-radius:0 4px 4px 0; color:var(--ink); font-style:italic;}
  .step .ex code{font-style:normal;}
  .pipe{display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin:14px 0; font-size:0.82rem;}
  .pipe .box{background:var(--panel); border:1px solid var(--line2); border-radius:6px; padding:7px 11px; text-align:center;}
  .pipe .box b{display:block; color:var(--green-d);}
  .pipe .arr{color:var(--mut);}
  .empty{padding:40px; text-align:center; color:var(--mut); font-style:italic;}
  .legend{font-size:0.8rem; color:var(--mut); display:flex; gap:16px; flex-wrap:wrap; margin-top:6px;}
  .legend i{width:11px; height:11px; border-radius:2px; display:inline-block; margin-right:4px; vertical-align:-1px;}

  /* ── navigation + help additions ───────────────────────────────────────── */
  header.top.sticky{position:sticky; top:0; z-index:50; background:var(--bg);
    padding-top:6px; margin-bottom:14px; border-bottom:1px solid var(--line);}
  .topnav{display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-top:9px;}
  .topnav a{font-size:0.85rem; color:var(--ink); text-decoration:none; padding:4px 12px;
    border:1px solid var(--line2); border-radius:999px; background:var(--panel); transition:all .15s;}
  .topnav a:hover{border-color:var(--green); color:var(--green-d); background:#eef3ec;}
  .topnav a.home{font-weight:600; border-color:#cfe0cf; background:#eef3ec; color:var(--green-d);}

  .fab{position:fixed; right:20px; bottom:20px; z-index:60; width:42px; height:42px;
    border-radius:50%; background:var(--green); color:#fff; border:none; font-size:1.15rem;
    box-shadow:0 3px 10px rgba(44,36,22,.25); cursor:pointer; display:none;}
  .fab.show{display:block;} .fab:hover{background:var(--green-d);}

  .howto{margin:10px 0 4px;}
  .howto > summary{cursor:pointer; color:var(--green-d); font-weight:600; font-size:0.84rem;
    list-style:none; display:inline-flex; align-items:center; gap:5px;
    border:1px solid #cfe0cf; background:#eef3ec; padding:4px 12px; border-radius:999px;}
  .howto > summary::-webkit-details-marker{display:none;}
  .howto[open] > summary{margin-bottom:9px;}
  .howto .body{background:var(--panel2); border:1px solid var(--line); border-left:3px solid var(--green);
    border-radius:4px; padding:11px 15px; max-width:86ch; font-size:0.92rem;}
  .howto .body p{margin:7px 0;} .howto .body b{color:var(--ink2);}
  .howto .body ul{margin:7px 0; padding-left:20px;} .howto .body li{margin:4px 0;}

  .navbtns{display:flex; gap:8px; align-items:center; justify-content:space-between;
    margin-bottom:14px; flex-wrap:wrap;}
  .navbtns .grp{display:flex; gap:8px; align-items:center;}
  .navbtns a, .navbtns span.dis{font-size:0.85rem; padding:6px 13px; border:1px solid var(--line2);
    border-radius:5px; text-decoration:none; color:var(--ink); background:var(--panel);}
  .navbtns a:hover{border-color:var(--green); color:var(--green-d);}
  .navbtns span.dis{opacity:.4;} .navbtns .ctr{color:var(--mut); font-size:0.85rem;}

  .filterbar{display:flex; gap:14px; align-items:center; flex-wrap:wrap; margin-bottom:13px;
    font-size:0.85rem; color:var(--mut);}
  .filterbar select{background:#fffefb; border:1px solid var(--line2); border-radius:4px;
    padding:5px 8px; font-family:inherit; font-size:0.85rem; color:var(--ink);}
  .filterbar .count{margin-left:auto; font-style:italic;}

  .gtable{width:100%; border-collapse:collapse; margin:10px 0; font-size:0.9rem; max-width:92ch;}
  .gtable th{text-align:left; padding:6px 10px; color:var(--mut); font-size:0.72rem;
    text-transform:uppercase; letter-spacing:0.04em; border-bottom:2px solid var(--line2);}
  .gtable td{padding:8px 10px; border-bottom:1px solid var(--line); vertical-align:top;}
  .gtable td:first-child{white-space:nowrap; font-weight:600; color:var(--ink2);}
  .gtable tr.grp td{background:var(--panel2); font-weight:700; color:var(--green-d);
    font-size:0.82rem; text-transform:uppercase; letter-spacing:0.03em;}
  .gloss-where{color:var(--mut); font-style:italic; font-size:0.82rem;}

  .toc{display:flex; gap:9px; flex-wrap:wrap; margin:10px 0 4px; font-size:0.87rem;}
  .toc a{color:var(--green-d); text-decoration:none; padding:3px 11px; border:1px solid #cfe0cf;
    background:#eef3ec; border-radius:999px;}
  .toc a:hover{background:#dfeadf;}
  /* help page tabs */
  .tabbar{display:flex; gap:4px; flex-wrap:wrap; border-bottom:2px solid var(--line2);
    margin:2px 0 16px;}
  .tabbar .tab{font-size:0.92rem; color:var(--mut); text-decoration:none; padding:9px 18px;
    border:1px solid transparent; border-bottom:none; border-radius:7px 7px 0 0; margin-bottom:-2px;
    position:relative;}
  .tabbar .tab:hover{color:var(--green-d); background:#eef3ec;}
  .tabbar .tab.on{color:var(--green-d); font-weight:600; background:var(--panel);
    border-color:var(--line2); border-bottom:2px solid var(--panel);}
  .tabbody{animation:fadein .12s ease-in;}
  /* help/docs read as a full-width article: text reaches the same right edge as the
     section headings (the dashboards keep their narrower reading caps). */
  .tabbody .formula, .tabbody .note, .tabbody .exclaims, .tabbody .wex,
  .tabbody .gtable, .tabbody .interp{max-width:none;}
  /* watch it score (animated scoring walkthrough) */
  .walk .lead2{color:var(--ink2); font-size:1.02rem;}
  .walk .sel{display:flex; gap:8px; flex-wrap:wrap; margin:12px 0 4px;}
  .walk .sel button.on{background:var(--green); color:#fff; border-color:var(--green-d);}
  .walk .claimline{font-size:1.05rem; color:var(--ink2); background:var(--panel2); border:1px solid var(--line);
    border-left:3px solid var(--green); border-radius:4px; padding:9px 12px; margin:8px 0;}
  .walk .counters{display:flex; gap:28px; flex-wrap:wrap; margin:14px 0 2px; align-items:flex-end;}
  .walk .ctr small{display:block; font-size:0.7rem; color:var(--mut); font-style:italic; margin-bottom:3px;}
  .walk .ctr b{font-size:1.75rem; font-variant-numeric:tabular-nums; line-height:1; color:var(--ink2);}
  .walk .ctr.h b{color:var(--green-d);} .walk .ctr.a b{color:var(--red-d);} .walk .ctr.d b{color:var(--blue);}
  .walk .bars{display:flex; align-items:flex-end; gap:3px; height:160px; margin:14px 0 2px;
    border-bottom:1px solid var(--line2); overflow-x:auto;}
  .walk .bcol{display:flex; flex-direction:column; justify-content:flex-end; align-items:center; min-width:16px; height:100%;}
  .walk .bcol .cap{font-size:0.62rem; color:var(--green-d); font-weight:700; margin-bottom:2px; white-space:nowrap;}
  .walk .bar{width:16px; background:var(--green); border-radius:2px 2px 0 0; height:0; opacity:.16;
    transition:height .18s ease, opacity .18s;}
  .walk .bar.neg{background:var(--amber);} .walk .bar.zero{background:var(--line2);}
  .walk .bcol.seen .bar{opacity:.9;}
  .walk .bcol.on .bar{opacity:1; outline:2px solid var(--ink2); outline-offset:1px;}
  .walk .readout{font-family:ui-monospace,Menlo,Consolas,monospace; font-size:0.85rem; background:var(--panel2);
    border:1px solid var(--line); border-radius:4px; padding:9px 12px; margin:9px 0; min-height:1.1em;}
  .walk .controls{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin:12px 0;}
  .walk .controls select{font-family:inherit; padding:4px 8px; border:1px solid var(--line2); border-radius:4px; background:var(--panel);}
  .walk .verdict{border:1px solid var(--line); border-left:3px solid var(--green); background:var(--panel2);
    border-radius:4px; padding:12px 14px; margin:14px 0; opacity:0; transition:opacity .3s;}
  .walk .verdict.show{opacity:1;}
  .walk .verdict .big{font-size:1.4rem; color:var(--green-d); font-weight:600; font-variant-numeric:tabular-nums; margin:5px 0;}
  .walk .verdict .recon{font-family:ui-monospace,Menlo,Consolas,monospace; font-size:0.82rem; color:var(--ink); margin:3px 0;}
  .walk .claims{display:flex; flex-direction:column; gap:7px; margin:10px 0;}
  .walk .cblock{border:1px solid var(--line); border-left:4px solid var(--line2); border-radius:5px;
    padding:8px 12px; background:var(--panel); font-size:0.95rem; color:var(--ink);}
  .walk .cblock.grounded{border-left-color:var(--green);}
  .walk .cblock.entangled{border-left-color:var(--amber);}
  .walk .cblock.confabulated{border-left-color:var(--red);}
  .walk .cblock.audit{background:var(--panel2); box-shadow:0 0 0 2px var(--ink2) inset;}
  .walk .cblock .lbl{font-weight:700; color:var(--ink2); margin-right:8px; font-family:ui-monospace,Menlo,Consolas,monospace;}
  .walk table.emat{border-collapse:collapse; font-size:0.82rem; margin:10px 0; font-variant-numeric:tabular-nums; overflow-x:auto;}
  .walk table.emat td, .walk table.emat th{border:1px solid var(--line); padding:5px 10px; text-align:center; color:var(--ink2);}
  .walk table.emat th{color:var(--mut); font-weight:600; font-size:0.74rem; background:var(--panel);}
  .walk table.emat th.rl{text-align:right; font-family:ui-monospace,Menlo,Consolas,monospace; color:var(--ink);}
  .walk table.emat td.col{background:#eef3ec;}
  .walk table.emat td.diag{outline:2px solid var(--ink2); font-weight:700;}
  @keyframes fadein{from{opacity:0;}to{opacity:1;}}
  .cards{display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:12px; margin:14px 0;}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:12px 14px;}
  .card h4{margin:0 0 5px; color:var(--green-d);} .card p{margin:5px 0; font-size:0.9rem;}

<body>
<div class="container">
  <header class="top sticky">
    <div>
      <h1>Claim-Ablation Studio</h1>
      <div class="sub">does the NLA actually <em>read</em> each claim from the activation? &middot; a judge-free, ground-truth-free faithfulness audit</div>
      <nav class="topnav">
        <a class="home" href="#/">⌂ Map</a>
        <a href="#/taxonomy">Taxonomy</a>
        <a href="cycle.html">Cycle-consistency</a>
        <a href="#/help">Help</a>
      </nav>
    </div>
    <div class="crumbs" id="crumbs"></div>
  </header>
  <div id="app"><div class="empty">loading…</div></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  small helpers
// ─────────────────────────────────────────────────────────────────────────────
const $ = (h) => { const t=document.createElement('template'); t.innerHTML=h.trim(); return t.content.firstChild; };
const esc = (s) => (s==null?'':String(s)).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt = (x,d=2) => (x==null||Number.isNaN(x))?'–':Number(x).toFixed(d);
const pct = (x,d=1) => (x==null||Number.isNaN(x))?'–':(100*x).toFixed(d)+'%';
const nats = (x) => (x==null)?'–':(x>=0?'+':'')+Number(x).toFixed(2);
// fragility / null-normalized-signal helpers (computed client-side from saved nulls)
function _pctl(arr,p){ if(!arr||!arr.length) return NaN; const a=[...arr].sort((x,y)=>x-y);
  const idx=(p/100)*(a.length-1), lo=Math.floor(idx), hi=Math.ceil(idx);
  return lo===hi?a[lo]:a[lo]+(a[hi]-a[lo])*(idx-lo); }
const _median = (a)=>_pctl(a,50);
// zeta = Δlogp in robust-SD units of THIS claim's own random-ablation noise (comparable across models)
function snipZeta(s){ if(!s||!s.null_dlogps||!s.null_dlogps.length||s.dlogp==null) return null;
  const med=_median(s.null_dlogps), mad=_median(s.null_dlogps.map(x=>Math.abs(x-med)));
  return (s.dlogp-med)/(1.4826*mad+1e-6); }
// activation fragility = 95th pct of all random-ablation effects on its located claims
function actNull95(rec){ const pool=[]; (rec.snippet_results||[]).forEach(s=>{
    if(s.located&&s.null_dlogps) pool.push(...s.null_dlogps); }); return pool.length?_pctl(pool,95):null; }
const __CACHE={};
async function __getJSON(f){
  if(Object.prototype.hasOwnProperty.call(__CACHE,f)){ if(__CACHE[f]===null) throw new Error('404 '+f); return __CACHE[f]; }
  let r; try{ r=await fetch(f); }catch(e){ __CACHE[f]=null; throw e; }
  if(!r.ok){ __CACHE[f]=null; throw new Error(r.status+' '+f); }
  const j=await r.json(); __CACHE[f]=j; return j;
}
// static snapshot: map the live JSON API onto pre-rendered files under data/
async function api(path){
  const p=path.split('?')[0];
  if(p==='/api/runs') return __getJSON('data/runs.json');
  const m=p.match(/^\/api\/run\/([^/]+)(?:\/(.*))?$/);
  if(m){
    const id=m[1], rest=m[2]||'';
    if(rest==='') return __getJSON('data/run/'+id+'/meta.json');
    if(rest==='records') return __getJSON('data/run/'+id+'/records.json');
    let mm;
    if(mm=rest.match(/^record\/(\d+)$/)){
      const recs=(await __getJSON('data/run/'+id+'/records.json')).records||[];
      const rec=recs.find(r=>String(r.idx)===mm[1]);
      if(rec) return rec; throw new Error('no record');
    }
    if(mm=rest.match(/^vectors\/(\d+)$/)){
      let vs=null; try{ vs=await __getJSON('data/run/'+id+'/vectors.json'); }catch(e){ vs=null; }
      const v = vs ? vs[mm[1]] : null;
      if(v) return v; throw new Error('no vectors');
    }
  }
  throw new Error('not found: '+path);
}
function clearTimer(){ if(window.__t){clearInterval(window.__t); window.__t=null;} }
function setCrumbs(html){ document.getElementById('crumbs').innerHTML = html; }
function svg(tag,attrs){ const e=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const k in attrs) e.setAttribute(k,attrs[k]); return e; }
function relTime(ts){ if(!ts) return ''; const s=(Date.now()/1000)-ts;
  if(s<60) return Math.round(s)+'s ago'; if(s<3600) return Math.round(s/60)+'m ago';
  if(s<86400) return Math.round(s/3600)+'h ago'; return Math.round(s/86400)+'d ago'; }
function dur(s){ if(s==null) return '–'; s=Math.round(s); if(s<90) return s+'s';
  if(s<5400) return Math.round(s/60)+'m'; return (s/3600).toFixed(1)+'h'; }

// open the help page at a given tab (overview|example|glossary|method)
function navHelp(tab){ location.hash = '#/help' + (tab?'/'+tab:''); }
// reusable inline "how to read this panel" disclosure
function howto(html){ return $(`<details class="howto"><summary>&#9432; How to read this</summary><div class="body">${html}</div></details>`); }

const VCOLOR = {grounded:'#4a7c59', entangled:'#b45309', confabulated:'#a65d57', unlocated:'#c9bfb0'};
const VLETTER = {grounded:'g', entangled:'e', confabulated:'c', unlocated:'u'};
const VMARK = {grounded:'mark-g', entangled:'mark-e', confabulated:'mark-c', unlocated:'mark-u'};

// ─────────────────────────────────────────────────────────────────────────────
//  router
// ─────────────────────────────────────────────────────────────────────────────
window.addEventListener('hashchange', route);
window.addEventListener('load', route);
function route(){
  clearTimer();
  const h = location.hash.replace(/^#\/?/, '');
  const parts = h.split('/').filter(Boolean);
  if(parts[0]==='help') return viewHelp(parts[1]);
  if(parts[0]==='taxonomy') return viewTaxonomy(parts[1]||null, parts[2]!=null?+parts[2]:null);
  if(parts[0]==='run' && parts[1] && parts[2]==='act' && parts[3]!=null) return viewActivation(parts[1], parts[3]);
  if(parts[0]==='run' && parts[1]) return viewRun(parts[1]);
  return viewMap();
}
const app = () => document.getElementById('app');

// ─────────────────────────────────────────────────────────────────────────────
//  VIEW 1 - experimental map
// ─────────────────────────────────────────────────────────────────────────────
async function viewMap(){
  setCrumbs('experimental map');
  app().innerHTML='';
  app().appendChild(mapIntro());
  const wrap = $(`<section class="panel"><h2><span class="num">▸</span> Runs <span class="sub2">each run audits one model's NLA over a corpus of activations</span></h2><div id="runs"><div class="empty">loading runs…</div></div></section>`);
  app().appendChild(wrap);
  let oldOpen=false;   // the "Old runs" (block-mode) group starts collapsed
  // Atom mode = claim-based (current); block mode = paragraph-based (old). Prefer the
  // run.json claim_mode; fall back to the -atoms id suffix for any run missing the field.
  const isAtomRun = r => (r.claim_mode==='atoms') || /-atoms$/.test(r.run_id||'');
  async function refresh(){
    try{
      const {runs, runs_dir} = await api('/api/runs');
      const host = wrap.querySelector('#runs');
      if(!runs.length){ host.innerHTML = `<div class="empty">No runs yet in <code>${esc(runs_dir)}</code>.<br>Create one: <code>python repl/run_claim_ablation.py qwen7b --mock --slow 0.6</code> (synthetic) or a real run on the GPU box.</div>`; return; }
      const current = runs.filter(isAtomRun), old = runs.filter(r=>!isAtomRun(r));
      const primary = current.length ? current : runs;   // if nothing is atom-mode, list everything normally
      host.innerHTML=''; const grid=$(`<div class="runs"></div>`);
      primary.forEach(r=>grid.appendChild(runCard(r)));
      if(current.length && old.length) grid.appendChild(oldRunsToggle(old.length, oldOpen, ()=>{ oldOpen=!oldOpen; refresh(); }));
      host.appendChild(grid);
      if(oldOpen && current.length && old.length){
        const box=$(`<div class="oldwrap"><div class="oldhead">Old runs <span class="sub2" style="font-weight:400">paragraph-based (block-mode) ablation, superseded by the atomic typed method - see <a href="#/help/method">Help</a></span></div><div class="runs oldgrid"></div></div>`);
        const sg=box.querySelector('.oldgrid'); old.forEach(r=>sg.appendChild(runCard(r)));
        host.appendChild(box);
      }
    }catch(e){ wrap.querySelector('#runs').innerHTML=`<div class="empty">error: ${esc(e.message)}</div>`; }
  }
  await refresh();
  window.__t = null /* static snapshot: no live polling */;   // experimental map auto-updates
  // cross-model comparison (computed once, client-side from saved nulls)
  const cmp = $(`<div id="cmp"></div>`); app().appendChild(cmp);
  try{ const {runs} = await api('/api/runs'); const panel = await comparePanel(runs); if(panel) cmp.appendChild(panel); }
  catch(e){ /* comparison is best-effort */ }
}

// build the fragility-controlled cross-model comparison (the fair confab comparison)
async function comparePanel(runs){
  const real = (runs||[]).filter(r=>!r.mock && r.status==='done' && (r.n_done||0)>0).slice(0,3);
  if(real.length<2) return null;
  const bins=[[0,0.5],[0.5,2],[2,10],[10,1e15]], binLab=['&lt;0.5','0.5–2','2–10','≥10'];
  const stats=[];
  for(const r of real){
    let recs; try{ recs=(await api('/api/run/'+encodeURIComponent(r.run_id)+'/records')).records; }catch(e){ continue; }
    const snips=[], a95=[];
    recs.forEach(rec=>{ if(rec.status!=='ok') return; const f=actNull95(rec);
      if(f!=null && !isNaN(f)) a95.push(f);
      (rec.snippet_results||[]).forEach(s=>{ if(s.located) snips.push({v:s.verdict,f:f}); }); });
    if(!snips.length) continue;
    const rate=(v)=>snips.filter(x=>x.v===v).length/snips.length;
    const binConfab=bins.map(([lo,hi])=>{ const sub=snips.filter(x=>x.f!=null&&!isNaN(x.f)&&x.f>=lo&&x.f<hi);
      const c=sub.filter(x=>x.v==='confabulated').length; return {n:sub.length, rate:sub.length?c/sub.length:null}; });
    stats.push({ name:r.model_label||r.run_id, n:snips.length, confab:rate('confabulated'),
      grounded:rate('grounded'), med95:_median(a95), binConfab });
  }
  if(stats.length<2) return null;
  const cols = stats.map(s=>`<th>${esc(s.name)}<br><span class="muted" style="font-weight:400">n=${s.n}</span></th>`).join('');
  let body=`<tr><td>activation fragility (median null 95th)</td>${stats.map(s=>`<td><b>${fmt(s.med95,2)}</b> nats</td>`).join('')}</tr>`;
  body+=`<tr><td>raw confabulated rate</td>${stats.map(s=>`<td>${pct(s.confab,1)}</td>`).join('')}</tr>`;
  body+=`<tr><td>raw grounded rate</td>${stats.map(s=>`<td>${pct(s.grounded,1)}</td>`).join('')}</tr>`;
  body+=`<tr class="grp"><td colspan="${stats.length+1}">confab rate within a matched fragility bin (the fair comparison)</td></tr>`;
  binLab.forEach((lab,bi)=>{ body+=`<tr><td>null95 ${lab} nats</td>${stats.map(s=>{ const b=s.binConfab[bi];
    return `<td>${b.n? '<b>'+pct(b.rate,1)+'</b> <span class="muted">(n='+b.n+')</span>':'<span class="muted">–</span>'}</td>`; }).join('')}</tr>`; });
  const p=$(`<section class="panel"><h2><span class="num">▸</span> Cross-model comparison <span class="sub2">fragility-controlled: raw confab rates are NOT comparable across models</span></h2>
    <table class="gtable"><thead><tr><th>metric</th>${cols}</tr></thead><tbody>${body}</tbody></table></section>`);
  p.appendChild(howto(`
    <p>A model whose injected activation is <b>fragile</b> (a large random-direction null) has a high bar for "grounded," so more claims fall below it as <b>confabulated</b> even if the verbalizer did not invent more. So the <b>raw confab rate is not comparable across models</b>.</p>
    <p>The fix: bin every activation by its <b>fragility</b> (null 95th) and compare the confab rate <em>within the same bin</em>. The bin where both models have activations is the fair test. If one model still confabulates more there, the gap is real; if it only confabulates more in its high-fragility bins, that is low test power, not more confabulation.</p>
    <p>Per claim, the activation page now also shows <b>signal ζ</b> = Δlogp in robust-SD units of that claim's own null, which is directly comparable across models.</p>`));
  return p;
}

function runCard(r){
  const prog = r.n_target ? (r.n_done||0)/r.n_target : 0;
  const statusCls = r.status==='running'?'run':r.status==='failed'?'failed':r.status==='done'?'done':'';
  const gr = r.grounded_rate;
  const c = $(`<a class="runcard" href="#/run/${encodeURIComponent(r.run_id)}">
    <div class="h"><span class="title">${esc(r.model_label||r.key||'run')}</span>
      <span class="pill ${statusCls}">${esc(r.status||'?')}</span></div>
    <div class="id">${esc(r.run_id)}</div>
    ${r.mock?'<span class="pill mock" style="margin-top:6px">synthetic / mock</span>':''}
    <div class="big">${gr==null?'–':pct(gr,1)} <small>causally-grounded-claim rate${r.snippets_located?` · ${r.snippets_grounded}/${r.snippets_located} claims`:''}</small></div>
    <div style="margin:10px 0 4px" class="bar ${statusCls==='run'?'run':''}"><div style="width:${(100*prog).toFixed(1)}%"></div></div>
    <div class="kv" style="margin-top:6px">
      <span>${r.n_done||0}/${r.n_target||'?'} activations</span>
      ${r.status==='running'&&r.eta_s!=null?`<span>ETA ${dur(r.eta_s)}</span>`:''}
      <span>${esc(relTime(r.updated_ts))}</span>
    </div>
    ${r.status==='failed'?`<div class="kv" style="color:var(--red-d)">${esc((r.error||'').slice(0,120))}</div>`:''}
  </a>`);
  return c;
}

// One collapsible card that stands in for every paragraph-based (block-mode) run, so the
// map foregrounds the current claim-based (atom) runs. Not an <a>: clicking toggles the group.
function oldRunsToggle(count, open, onToggle){
  const c = $(`<div class="runcard oldtoggle" role="button" tabindex="0" aria-expanded="${open?'true':'false'}">
    <div class="h"><span class="title">Old runs</span><span class="pill">${count}</span></div>
    <div class="id">paragraph-based (block-mode) ablation</div>
    <div style="margin-top:10px; color:var(--mut); font-size:0.92rem; line-height:1.45">${open?'▾ hide':'▸ show'} the ${count} superseded run${count>1?'s':''}<br><small>the coarse blank-line paragraph split, before atomic typed claims</small></div>
  </div>`);
  const fire = ()=>onToggle();
  c.addEventListener('click', fire);
  c.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); fire(); }});
  return c;
}

function mapIntro(){
  return $(`<section class="panel">
    <p class="lead" style="margin-top:0">An NLA explains an activation vector <code>h</code> with a few short claims. This studio asks, for each claim, a causal question: <b>was it actually read out of <code>h</code>, or would the verbalizer have said it anyway?</b></p>
    <div class="pipe">
      <div class="box"><b>h</b>activation<br>(model internal)</div><span class="arr">→</span>
      <div class="box"><b>AV</b>verbalizer<br>h → claims</div><span class="arr">→</span>
      <div class="box"><b>AR</b>reconstructor<br>claim → direction Δ</div><span class="arr">→</span>
      <div class="box"><b>ablate</b>remove Δ<br>from h → h'</div><span class="arr">→</span>
      <div class="box"><b>re-read</b>teacher-force<br>logP(claim|h) vs logP(claim|h')</div>
    </div>
    <p>If removing a claim's direction from <code>h</code> makes the verbalizer much less likely to repeat that claim - more than a <em>random</em> direction would - the claim was <b>grounded</b> in the activation. If not, it was <b>confabulated</b>: produced from the verbalizer's prior, true or not. This measures faithfulness-to-activation, the gap the NLA paper's heuristics cannot close.</p>
    <p class="muted" style="margin-top:4px">New here? The <a href="#/help">Help</a> page has a plain-English overview, a worked example with real numbers, a glossary of every number, and the full method.</p>
  </section>`);
}

// ─────────────────────────────────────────────────────────────────────────────
//  VIEW 2 - run detail (live)
// ─────────────────────────────────────────────────────────────────────────────
async function viewRun(id){
  setCrumbs(`<a href="#/">map</a> &rsaquo; ${esc(id)}`);
  app().innerHTML = `<div class="empty">loading run…</div>`;
  async function refresh(){
    let data, recs;
    try{ data = await api('/api/run/'+encodeURIComponent(id));
         recs = (await api('/api/run/'+encodeURIComponent(id)+'/records')).records; }
    catch(e){ app().innerHTML=`<div class="empty">error: ${esc(e.message)}</div>`; clearTimer(); return; }
    renderRun(id, data.run, data.summary, recs);
    if(data.run.status!=='running'){ clearTimer(); }
  }
  await refresh();
  if(!window.__t) window.__t = null /* static snapshot: no live polling */;  // live updates while running
}

function renderRun(id, run, summary, recs){
  const a = app(); a.innerHTML='';
  // ── status / progress ──
  const prog = run.n_target ? (run.n_done||0)/run.n_target : 0;
  const statusCls = run.status==='running'?'run':run.status==='failed'?'failed':'done';
  a.appendChild($(`<section class="panel">
    <h2><span class="num">▸</span> ${esc(run.model_label||run.key)} <span class="pill ${statusCls}">${esc(run.status)}</span>
      ${run.mock?'<span class="pill mock">synthetic</span>':''}
      <span class="sub2">${esc(run.phase||'')}</span></h2>
    <div class="bar ${statusCls==='run'?'run':''}"><div style="width:${(100*prog).toFixed(1)}%"></div></div>
    <div class="kv" style="margin-top:10px">
      <span class="k"><b>${run.n_done||0}/${run.n_target||'?'}</b><small>activations audited</small></span>
      <span class="k"><b>${run.n_ok||0}</b><small>usable · ${run.n_skip||0} skipped · ${run.n_cjk||0} CJK</small></span>
      <span class="k"><b>${dur(run.elapsed_s)}</b><small>elapsed${run.status==='running'&&run.eta_s!=null?` · ETA ${dur(run.eta_s)}`:''}</small></span>
      <span class="k"><b>${esc(relTime(run.updated_ts))}</b><small>last update</small></span>
    </div>
    ${run.status==='running'&&run.last_text?`<div class="out" style="margin-top:10px"><span class="muted">latest read:</span> ${esc(run.last_text)}</div>`:''}
    ${run.error?`<div class="note" style="border-left-color:var(--red)">${esc(run.error)}</div>`:''}
    <div class="kv" style="margin-top:10px; font-size:0.78rem">
      <span>AV <code>${esc(run.av||'')}</code></span><span>AR <code>${esc(run.ar||'')}</code></span>
      <span>layer K=${run.layer}</span><span>d=${run.d_model}</span>
      <span>R=${run.R} · α=${run.alpha} · null pct=${run.null_pct}</span>
      ${run.injection_scale!=null?`<span>inj_scale ${fmt(run.injection_scale,1)}</span>`:''}
      ${run.dataset?`<span>corpus ${esc(run.dataset)}</span>`:''}
    </div>
  </section>`));

  // ── corpus summary ──
  a.appendChild(summaryPanel(summary));
  const catP = atomCategoryPanel(summary); if(catP) a.appendChild(catP);

  // ── activations grid (with filter + sort) ──
  const ok = recs.filter(r=>r.status==='ok');
  const skipped = recs.filter(r=>r.status!=='ok');
  window.__actFilter = window.__actFilter || 'all';
  window.__actSort = window.__actSort || 'idx';
  const panel = $(`<section class="panel"><h2><span class="num">▸</span> Activations <span class="sub2">click one to see every claim's causal test</span></h2></section>`);
  panel.appendChild(howto(`
    <p>Each card is one audited activation. The coloured squares are its claims
    (<b style="color:${VCOLOR.grounded}">■</b> grounded, <b style="color:${VCOLOR.entangled}">■</b> entangled,
     <b style="color:${VCOLOR.confabulated}">■</b> confabulated). The text is the verbalizer's explanation;
     <code>|h|</code> is the activation's vector norm; <code>X/Y grounded</code> is grounded-over-located claims.</p>
    <p>Use <b>show</b> to filter (e.g. only activations that contain a confabulated claim) and <b>sort by</b> to
    surface the most or least grounded. Click any card for its full per-claim causal test.</p>`));
  const bar = $(`<div class="filterbar">
    <label>show <select id="fFilter">
      <option value="all">all activations</option>
      <option value="has-confab">contains a confabulated claim</option>
      <option value="has-entangled">contains an entangled claim</option>
      <option value="all-grounded">all claims grounded</option>
      <option value="has-unlocated">contains an unlocated claim</option>
    </select></label>
    <label>sort by <select id="fSort">
      <option value="idx">index</option>
      <option value="most-grounded">most grounded claims</option>
      <option value="most-confab">most confabulated claims</option>
      <option value="least-grounded">fewest grounded claims</option>
      <option value="hnorm">highest &#8214;h&#8214;</option>
    </select></label>
    <span class="count" id="actCount"></span>
  </div>`);
  panel.appendChild(bar);
  const host = $(`<div class="acts" id="actgrid"></div>`); panel.appendChild(host);
  if(skipped.length) panel.appendChild($(`<p class="muted" style="margin-top:12px">${skipped.length} skipped (fewer than 2 snippets, or CJK injection-failure smell): ${skipped.slice(0,12).map(r=>`#${r.idx}`).join(', ')}${skipped.length>12?'…':''}</p>`));
  a.appendChild(panel);
  const fSel=bar.querySelector('#fFilter'), sSel=bar.querySelector('#fSort');
  fSel.value=window.__actFilter; sSel.value=window.__actSort;
  fSel.onchange=()=>{ window.__actFilter=fSel.value; fillActGrid(id, ok, host, bar); };
  sSel.onchange=()=>{ window.__actSort=sSel.value; fillActGrid(id, ok, host, bar); };
  fillActGrid(id, ok, host, bar);
}

function fillActGrid(id, ok, host, bar){
  const f=window.__actFilter, srt=window.__actSort;
  const has=(r,v)=>(r.snippet_results||[]).some(s=>s.verdict===v);
  const cc=r=>(r.snippet_results||[]).filter(s=>s.verdict==='confabulated').length;
  let list=ok.filter(r=>{
    if(f==='has-confab') return has(r,'confabulated');
    if(f==='has-entangled') return has(r,'entangled');
    if(f==='has-unlocated') return has(r,'unlocated');
    if(f==='all-grounded') return r.located_count>0 && r.grounded_count===r.located_count;
    return true;
  });
  list.sort((a,b)=>{
    if(srt==='most-grounded') return (b.grounded_count||0)-(a.grounded_count||0);
    if(srt==='most-confab') return cc(b)-cc(a);
    if(srt==='least-grounded') return (a.grounded_count||0)-(b.grounded_count||0);
    if(srt==='hnorm') return (b.h_norm||0)-(a.h_norm||0);
    return a.idx-b.idx;
  });
  host.innerHTML='';
  if(!list.length) host.innerHTML='<div class="empty">no activations match this filter…</div>';
  else list.forEach(r=> host.appendChild(actCard(id, r)));
  const cnt=bar.querySelector('#actCount'); if(cnt) cnt.textContent=`${list.length} of ${ok.length} shown`;
}

function summaryPanel(s){
  if(!s || !s.n_activations) return $(`<section class="panel"><h2><span class="num">▸</span> Corpus result</h2><div class="empty">waiting for results…</div></section>`);
  const p = $(`<section class="panel"><h2><span class="num">▸</span> Corpus result <span class="sub2">aggregated over every audited claim</span></h2></section>`);
  p.appendChild($(`<div class="scoregrid">
    <div class="metric green">${pct(s.grounded_rate,1)}<small>grounded rate (${s.n_grounded}/${s.n_located})</small></div>
    <div class="metric" style="color:var(--amber)">${pct(s.entangled_rate,1)}<small>entangled (${s.n_entangled||0})</small></div>
    <div class="metric red">${pct(s.confab_rate,1)}<small>confabulated (${s.n_confab||0})</small></div>
    <div class="metric">${s.n_activations}<small>activations · ${s.n_located} claims</small></div>
    <div class="metric green">${nats(s.dlogp_grounded_mean)}<small>mean Δlogp · grounded</small></div>
    <div class="metric blue">${fmt(s.dlogp_dmse_pearson,2)}<small>Δlogp ↔ ΔMSE corr.</small></div>
  </div>`));
  p.appendChild(howto(`
    <p>Every <b>claim</b> from every activation gets one of three verdicts. These are the corpus-wide rates:</p>
    <ul>
      <li><b>grounded rate</b> - the headline. Fraction of claims the verbalizer genuinely read out of the activation (it depends on <code>h</code> <em>and</em> the dependence is specific to that claim). Higher is a more faithful NLA.</li>
      <li><b>entangled</b> - claims that do depend on <code>h</code> but whose direction overlaps a neighbouring claim, so credit can't be cleanly assigned. Honest middle ground, not a failure.</li>
      <li><b>confabulated</b> - claims the verbalizer would produce regardless of <code>h</code> (true or not). This is the confabulation rate the paper's heuristics can't isolate.</li>
    </ul>
    <p><b>mean Δlogp · grounded</b> is how many nats of probability a grounded claim loses when its own direction is removed (bigger = stronger dependence). <b>Δlogp ↔ ΔMSE corr.</b> is the agreement between our causal test and the AR's independent "removing a true claim hurts reconstruction" signal; near +1 means two unrelated methods point the same way.</p>
    <p>The two charts below plot the same numbers across all claims. Hover any metric tile to see the raw counts.</p>`));
  const charts = $(`<div style="display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-top:16px"></div>`);
  charts.appendChild(wrapChart('Distribution of Δlogp (nats)', 'how much each claim weakens when its own direction is ablated; confabulated claims pile up near 0', histogramSVG(s.dlogp_hist)));
  charts.appendChild(wrapChart('Δlogp vs AR ΔMSE (free cross-check)', 'paper says removing a true claim hurts AR reconstruction (ΔMSE>0); our causal Δlogp should agree', scatterSVG(s.scatter, s.dlogp_dmse_pearson)));
  p.appendChild(charts);
  if(s.spec_offdiag_mean!=null) p.appendChild($(`<p class="muted" style="margin-top:12px">Mean off-target effect (specificity control): <b>${nats(s.spec_offdiag_mean)} nats</b> - ablating one claim should barely move the others; a value near 0 means the test is specific.</p>`));
  return p;
}

// ── atom mode: verdict-by-category (the headline science; gist read vs position confabulated) ──
function verdictBar(d){
  const loc=d.located||0;
  const wrap=$(`<div style="display:flex;height:15px;border-radius:4px;overflow:hidden;background:#efe9e0;flex:1;min-width:120px"></div>`);
  if(loc) [['grounded',VCOLOR.grounded],['entangled',VCOLOR.entangled],['confabulated',VCOLOR.confabulated]].forEach(([v,c])=>{
    const w=100*(d[v]||0)/loc; if(w>0) wrap.appendChild($(`<span style="width:${w}%;background:${c}" title="${v}: ${d[v]} (${w.toFixed(0)}%)"></span>`)); });
  return wrap;
}
function catRow(label, d){
  const r=$(`<div class="catrow" style="display:flex;align-items:center;gap:12px;margin:5px 0"></div>`);
  r.appendChild($(`<div style="width:236px;font-size:0.84rem">${esc(label)} <span class="muted">n=${d.located||0}</span></div>`));
  r.appendChild(verdictBar(d));
  const ci=(d.grounded_ci&&d.grounded_ci[0]!=null)?` <span class="muted">[${pct(d.grounded_ci[0],0)}–${pct(d.grounded_ci[1],0)}]</span>`:'';
  r.appendChild($(`<div style="width:158px;font-size:0.84rem;text-align:right"><b style="color:${VCOLOR.grounded}">${pct(d.grounded_rate,0)}</b> grounded${ci}</div>`));
  return r;
}
function atomCategoryPanel(s){
  if(!s || !s.by_bucket) return null;   // block-mode runs have no typed claims
  const p = $(`<section class="panel atomcat"><h2><span class="num">▸</span> What kinds of claims get grounded <span class="sub2">verdict split by the claim's semantic category - atom mode</span></h2></section>`);
  p.appendChild(howto(`
    <p>Every content claim is bucketed by what it is <em>about</em>. Each bar is that bucket's verdict mix
       (<b style="color:${VCOLOR.grounded}">grounded</b> / <b style="color:${VCOLOR.entangled}">entangled</b> /
        <b style="color:${VCOLOR.confabulated}">confabulated</b>) over its located claims; the number at right is the grounded rate with a 95% Wilson interval.</p>
    <p>The semantic category predicts groundedness far better than the coarse type or role. The recurring finding: <b>GIST</b> (what the text is about) is read from the activation, while <b>POSITION / STRUCTURE</b> (where the token sits, what comes next) is confabulated from the prior.</p>`));
  const BK=[['gist','GIST - genre / topic / tone / style'],['quote','QUOTE - verbatim span'],
            ['position','POSITION / STRUCTURE'],['prediction','PREDICTION - what comes next']];
  BK.forEach(([k,lab])=>{ const d=s.by_bucket[k]; if(d&&d.n) p.appendChild(catRow(lab,d)); });
  const g=s.by_bucket.gist, po=s.by_bucket.position;
  if(g&&po&&g.grounded_rate!=null&&po.grounded_rate!=null)
    p.appendChild($(`<p class="muted" style="margin-top:10px">GIST grounds <b style="color:${VCOLOR.grounded}">${pct(g.grounded_rate,0)}</b> vs POSITION <b>${pct(po.grounded_rate,0)}</b> (gap ${nats((g.grounded_rate-po.grounded_rate)*100).replace('+','+')} pts). The NLA reads the semantic gist and confabulates positional/structural claims.</p>`));
  if(s.by_type && (s.by_type.theme||s.by_type.detail)){
    p.appendChild($(`<h3 style="margin:16px 0 4px; font-size:0.9rem; color:var(--ink2)">By partition type</h3>`));
    ['theme','detail'].forEach(t=>{ const d=s.by_type[t]; if(d&&d.n) p.appendChild(catRow(t,d)); });
  }
  if(s.hedged && (s.hedged.hedged||s.hedged.confident)){
    p.appendChild($(`<h3 style="margin:16px 0 4px; font-size:0.9rem; color:var(--ink2)">Hedged vs confident <span class="muted" style="font-weight:400">(is the AV's hedging calibrated to groundedness?)</span></h3>`));
    ['hedged','confident'].forEach(t=>{ const d=s.hedged[t]; if(d&&d.n) p.appendChild(catRow(t,d)); });
  }
  return p;
}

function actCard(id, r){
  const chips = (r.snippet_results||[]).map(s=>`<span class="chip ${VLETTER[s.verdict]||'u'}" title="${esc(s.verdict)}"></span>`).join('');
  return $(`<a class="actcard" href="#/run/${encodeURIComponent(id)}/act/${r.idx}">
    <div class="top"><span>#${r.idx}</span><span class="tok">${esc((r.read_token||'').replace(/\n/g,'⏎'))}</span></div>
    <div class="chips">${chips}</div>
    <div class="ex">${esc((r.z_inner||'').slice(0,150))}</div>
    <div class="top" style="margin-top:8px"><span>${r.grounded_count||0}/${r.located_count||0} grounded</span><span>|h|=${fmt(r.h_norm,0)}</span></div>
  </a>`);
}

// ─────────────────────────────────────────────────────────────────────────────
//  VIEW 3 - activation detail
// ─────────────────────────────────────────────────────────────────────────────
async function viewActivation(id, idx){
  setCrumbs(`<a href="#/">map</a> &rsaquo; <a href="#/run/${encodeURIComponent(id)}">${esc(id)}</a> &rsaquo; activation #${esc(idx)}`);
  app().innerHTML = `<div class="empty">loading activation…</div>`;
  let rec, vec, idxs=[];
  try{
    rec = await api(`/api/run/${encodeURIComponent(id)}/record/${idx}`);
    try{ vec = await api(`/api/run/${encodeURIComponent(id)}/vectors/${idx}`); }catch(e){ vec=null; }
    try{ idxs = (await api(`/api/run/${encodeURIComponent(id)}/records`)).records
                 .filter(r=>r.status==='ok').map(r=>r.idx); }catch(e){ idxs=[]; }
  }catch(e){ app().innerHTML=`<div class="empty">error: ${esc(e.message)}</div>`; return; }
  renderActivation(id, rec, vec, idxs);
}

function renderActivation(id, r, vec, idxs){
  const a = app(); a.innerHTML='';
  // prev / next / back navigation among the run's usable activations
  idxs = idxs||[];
  const cur = idxs.indexOf(r.idx);
  const prev = cur>0 ? idxs[cur-1] : null;
  const next = (cur>=0 && cur<idxs.length-1) ? idxs[cur+1] : null;
  const lnk = (i,lbl)=> i==null ? `<span class="dis">${lbl}</span>`
      : `<a href="#/run/${encodeURIComponent(id)}/act/${i}">${lbl}</a>`;
  a.appendChild($(`<div class="navbtns">
    <div class="grp">${lnk(prev,'← prev')}${lnk(next,'next →')}</div>
    <span class="ctr">${cur>=0?`activation ${cur+1} of ${idxs.length}`:''}</span>
    <div class="grp"><a href="#/run/${encodeURIComponent(id)}">↑ back to run</a><a href="#/help/glossary">glossary</a></div>
  </div>`));
  // header metrics
  const hdr = $(`<section class="panel">
    <h2><span class="num">▸</span> Activation #${r.idx} <span class="sub2">${esc(r.doc_id||'')} · position ${r.position} of ${r.n_tokens} tokens</span></h2>
    <div class="scoregrid">
      <div class="metric green">${r.grounded_count}/${r.located_count}<small>grounded claims</small></div>
      <div class="metric">${fmt(r.h_norm,1)}<small>‖h‖ activation norm</small></div>
      <div class="metric">${(()=>{const f=actNull95(r);return f==null?'–':fmt(f,2);})()}<small>fragility (null 95th, nats)</small></div>
      <div class="metric">${fmt(r.cos_full,3)}<small>cos(AR(z), h) full reconstruction</small></div>
      <div class="metric">${fmt(r.mse_full,3)}<small>AR MSE(z, h)</small></div>
    </div>
  </section>`);
  hdr.appendChild(howto(`
    <p>This is one activation vector <code>h</code> taken from the base model at one token position, now under audit.</p>
    <ul>
      <li><b>grounded claims</b> - how many of this activation's located claims passed the full causal test (grounded / located).</li>
      <li><b>‖h‖</b> - the length of the activation vector. Only its <em>direction</em> matters for injection (it is rescaled), but the norm is stored for reference.</li>
      <li><b>fragility (null 95th)</b> - how much a <em>random</em> direction ablation moves this activation's claims (95th-pct nat). Near 0 = robust (only claim-specific ablations matter, the test has full power); large = fragile (any perturbation disrupts the read, so the bar for "grounded" is high and the test loses power). This is the key quantity for fair cross-model comparison: the per-claim <b>signal ζ</b> below is Δlogp measured in units of this noise.</li>
      <li><b>cos(AR(z), h)</b> - how well the reconstructor maps the verbalizer's whole explanation back to this activation. Near 1 = the explanation as a whole captures <code>h</code>; this whole-explanation fidelity is what the NLA paper reports.</li>
      <li><b>AR MSE(z, h)</b> - the same thing as a distance: MSE = 2(1 − cos), so 0 is perfect and 2 is orthogonal.</li>
    </ul>`));
  a.appendChild(hdr);

  // source text + read token
  const src = $(`<section class="panel"><h2><span class="num">▸</span> What the model was reading <span class="sub2">the activation was taken at the highlighted token</span></h2></section>`);
  const ctxL = esc(r.context_left||''), ctxR = esc(r.context_right||''), tok = esc((r.read_token||'').replace(/\n/g,'⏎'));
  if(r.context_left||r.context_right){
    src.appendChild($(`<div class="src">…${ctxL}<span class="readtok">${tok}</span>${ctxR}…</div>`));
  } else {
    src.appendChild($(`<div class="src muted">no stored context</div>`));
  }
  if(r.source_text) src.appendChild($(`<details style="margin-top:8px"><summary class="muted" style="cursor:pointer">full source document</summary><div class="src" style="margin-top:6px; max-height:320px">${esc(r.source_text)}</div></details>`));
  a.appendChild(src);

  // explanation with colored snippets
  const expl = $(`<section class="panel"><h2><span class="num">▸</span> The verbalizer's explanation <span class="sub2">each claim color-coded by verdict</span></h2></section>`);
  expl.appendChild(coloredExplanation(r));
  expl.appendChild($(`<div class="legend"><span><i style="background:${VCOLOR.grounded}"></i>grounded - read from h via its own direction</span><span><i style="background:${VCOLOR.entangled}"></i>entangled - depends on h but overlaps a sibling claim</span><span><i style="background:${VCOLOR.confabulated}"></i>confabulated - not dependent on h</span><span><i style="background:${VCOLOR.unlocated}"></i>could not locate tokens</span></div>`));
  a.appendChild(expl);

  // per-snippet causal tests
  const tests = $(`<section class="panel"><h2><span class="num">▸</span> Per-claim causal test <span class="sub2">Δlogp vs the random-direction null</span></h2></section>`);
  tests.appendChild(howto(`
    <p>One block per claim. For each, we removed that claim's direction from <code>h</code> and re-measured how likely the verbalizer is to still say it.</p>
    <ul>
      <li>The <b>bar</b> shows <b>Δlogp</b> (how many nats the claim weakened) against the <b>null band</b> - the grey strip and dashed line are what <em>random</em> directions achieve. A bar far past the dashed line means a real effect.</li>
      <li>The numbers under it: <b>own vs rival</b> is the key specificity ratio (own ablation effect ÷ the strongest other-claim ablation; must clear the margin to be grounded); <b>collateral</b> is how much ablating this claim disturbed the others; <b>ΔMSE</b> is the AR's independent agreement; <b>‖Δ‖</b> / <b>h·Δ̂</b> describe the direction's size and overlap with <code>h</code>.</li>
      <li>The small <b>per-token chart</b> shows exactly where in the claim's words the probability dropped (green = under <code>h</code>, red = under the ablated <code>h′</code>).</li>
    </ul>
    <p>Full definitions are in the <a href="#/help/glossary">glossary</a>.</p>`));
  (r.snippet_results||[]).forEach((s,i)=> tests.appendChild(snippetBlock(s, vec, i)));
  a.appendChild(tests);

  // specificity matrix + vector panel
  if((r.snippet_results||[]).length>=2) a.appendChild(specificityPanel(r));
  if(vec) a.appendChild(vectorPanel(r, vec));
}

function coloredExplanation(r){
  // rebuild the inner text, wrapping each snippet in a colored span
  const inner = r.z_inner||''; let html = esc(inner);
  (r.snippet_results||[]).forEach(s=>{
    const cls = VMARK[s.verdict]||'mark-u';
    const safe = esc(s.text);
    const meta = s.type ? ` · ${esc(s.type)}${s.role?'/'+esc(s.role):''}` : '';
    html = html.replace(safe, `<span class="${cls}" title="${esc(s.verdict)}${meta} · Δlogp ${nats(s.dlogp)}">${safe}</span>`);
  });
  return $(`<div class="out">${html.replace(/\n/g,'<br>')}</div>`);
}

function interpret(s){
  if(!s.located) return `The verbalizer's tokens for this claim could not be located in the teacher-forced sequence, so it was not scored.`;
  const d = s.dlogp, thr = s.null_thr, cm = s.col_off_max, ratio = s.spec_ratio;
  if(s.verdict==='confabulated'){
    return `Ablating this claim's direction changed the verbalizer's probability of repeating it by only ${nats(d)} nats, within the random-direction null (${fmt(thr,2)}). The activation does not causally support it; the verbalizer would likely produce it regardless. Verdict: confabulated.`;
  }
  if(s.verdict==='entangled'){
    return `Removing this claim's direction weakened it by ${fmt(d,2)} nats, well above the ${fmt(thr,2)}-nat null, so it does depend on the activation. But ablating a different claim's direction weakened it almost as much (${fmt(cm,2)} nats), so the drop cannot be attributed to this claim's own direction; its direction overlaps a sibling claim. Verdict: entangled.`;
  }
  const tail = (ratio==null)
    ? `and no other claim's ablation affected it`
    : `and ${fmt(ratio,1)}× more than the strongest other-claim ablation (${fmt(cm,2)} nats)`;
  return `Removing this claim's direction weakened it by ${fmt(d,2)} nats, far above the ${fmt(thr,2)}-nat random-direction null, ${tail}. The drop is specific to this claim's own direction. Verdict: grounded.`;
}

function snippetBlock(s, vec, i){
  const b = $(`<div class="snip ${s.verdict}"></div>`);
  b.appendChild($(`<div class="row" style="justify-content:space-between; align-items:flex-start">
      <p class="claim" style="flex:1; min-width:60%">${esc(s.text)}</p>
      <span class="vbadge ${s.verdict}">${esc(s.verdict)}</span></div>`));
  if(s.type){   // atom mode: typed claim metadata (from the two-layer decomposition)
    const tag=(t,bg)=>`<span style="display:inline-block;font-size:0.68rem;padding:1px 6px;border-radius:8px;background:${bg||'#ece4d8'};color:#4a3f2f;margin-right:4px">${esc(t)}</span>`;
    b.appendChild($(`<div class="typedchips" style="margin:-2px 0 6px">${tag(s.type)}${s.role?tag(s.role):''}${s.subtype?tag(s.subtype):''}${(s.hedged&&s.hedged.length)?tag('hedged: '+s.hedged.join(', '),'#e7ddf0'):''}</div>`));
  }
  b.appendChild($(`<p class="interp">${interpret(s)}</p>`));
  // dlogp vs null bar
  b.appendChild(nullBarSVG(s));
  const _z = snipZeta(s);
  b.appendChild($(`<div class="statline">
    <span><b>${nats(s.dlogp)}</b> Δlogp (nats)</span>
    <span>null thr <b>${fmt(s.null_thr,2)}</b></span>
    <span title="Δlogp in robust-SD units of this claim's own random-ablation noise; comparable across models">signal ζ <b>${_z==null?'–':fmt(_z,1)}</b></span>
    <span>own vs rival <b>${s.spec_ratio==null?'∞':fmt(s.spec_ratio,2)+'×'}</b> (rival ${fmt(s.col_off_max,2)})</span>
    <span>collateral <b>${nats(s.spec_offdiag)}</b></span>
    <span>ΔMSE <b>${nats(s.dmse)}</b></span>
    <span>‖Δ‖ <b>${fmt(s.delta_norm,2)}</b></span>
    <span>h·Δ̂ <b>${fmt(s.proj_mag,2)}</b> (cos ${fmt(s.proj_cos,3)})</span>
    <span>span <b>${s.n_span_tokens}</b> tok</span>
  </div>`));
  // per-token logp where the claim's probability dropped
  if(vec && vec.tok_logp_h && vec.tok_logp_ablate && vec.tok_logp_ablate[i] && s.token_span){
    b.appendChild(wrapChart('Per-token log-prob across the claim span',
      'green = under h, red = under the ablated h′; the gap is where the claim lost support',
      tokLogpSVG(vec.tok_logp_h, vec.tok_logp_ablate[i], s.token_span)));
  }
  return b;
}

// ── specificity matrix ──
// SVG heatmap - scales to the dozens of claims an atom-mode activation can have (the n×n
// HTML table below is unreadable past ~8 claims).
function specificityHeatmapSVG(r){
  const sr = r.snippet_results, n = sr.length;
  let max = 0.5; sr.forEach(s=> (s.spec_row||[]).forEach(v=>{ if(v!=null) max=Math.max(max, Math.abs(v)); }));
  const cell = Math.max(7, Math.min(22, Math.floor(560/n))), lab = 16, pad = 4;
  const W = lab + n*cell + pad, H = lab + n*cell + pad;
  const s = svg('svg',{viewBox:`0 0 ${W} ${H}`, width:'100%', style:`max-width:${Math.max(W,240)}px`, class:'specheat'});
  for(let j=0;j<n;j++)   // verdict tick above each column (which claim it is)

  for(let i=0;i<n;i++) for(let j=0;j<n;j++){
    const v = (sr[i].spec_row||[])[j];
    const inten = v==null?0:Math.min(1, Math.abs(v)/max);
    const col = v==null?'#f4efe7':(v>=0?`rgba(74,124,89,${inten})`:`rgba(166,93,87,${inten})`);
    const rect = svg('rect',{x:lab+j*cell, y:lab+i*cell, width:cell-1, height:cell-1, fill:col, rx:1});
    if(i===j){ rect.setAttribute('stroke','#2c2416'); rect.setAttribute('stroke-width','1'); }
    const t = svg('title',{}); t.textContent = `ablate C${i} → C${j}: ${nats(v)} nats (C${j} ${sr[j].verdict||''})`;

  }
  return s;
}
function specificityPanel(r){
  const sr = r.snippet_results; const n = sr.length;
  const p = $(`<section class="panel"><h2><span class="num">▸</span> Specificity matrix <span class="sub2">effect on claim j (columns) of ablating claim i (rows) - should be diagonal</span></h2></section>`);
  p.appendChild(howto(`
    <p>Cell (row <code>i</code>, column <code>j</code>) = how many nats claim <code>j</code> weakened when we ablated claim <code>i</code>'s direction. Greener = bigger drop.</p>
    <ul>
      <li><b>Read down a column</b> to judge one claim: if the cell on the diagonal (where row = column) is clearly the darkest in its column, that claim is <b>grounded</b> - its own direction is what drives it.</li>
      <li>If an <b>off-diagonal cell in the column is nearly as dark</b>, the claim is <b>entangled</b>: another claim's direction moves it just as much, so the two share a direction.</li>
      <li>A whole column that stays pale means that claim barely depends on <code>h</code> (<b>confabulated</b>).</li>
    </ul>`));
  // values: sr[i].spec_row[j]. HTML table with numbers for a few claims; SVG heatmap past that.
  let max = 0.5; sr.forEach(s=> (s.spec_row||[]).forEach(v=> { if(v!=null) max=Math.max(max, Math.abs(v)); }));
  if(n>8){
    p.appendChild(wrapChart(`Specificity heatmap · ${n}×${n} claims`,
      "rows = ablated claim, columns = affected claim; greener = bigger drop; the outlined diagonal should dominate its column; the tick above each column is that claim's verdict colour",
      specificityHeatmapSVG(r)));
  } else {
    const tbl = $(`<table class="mat"></table>`);
    const head = $(`<tr><th></th></tr>`); for(let j=0;j<n;j++) head.appendChild($(`<th>C${j}</th>`)); tbl.appendChild(head);
    for(let i=0;i<n;i++){
      const tr = $(`<tr><th>ablate C${i}</th></tr>`);
      for(let j=0;j<n;j++){
        const v = (sr[i].spec_row||[])[j];
        const inten = v==null?0:Math.min(1, Math.abs(v)/max);
        const col = v==null?'#fff':(v>=0?`rgba(74,124,89,${inten})`:`rgba(166,93,87,${inten})`);
        tr.appendChild($(`<td style="background:${col}; color:${inten>0.55?'#fff':'var(--ink2)'}" title="ablate C${i} → claim C${j}: ${nats(v)} nats">${v==null?'–':nats(v)}</td>`));
      }
      tbl.appendChild(tr);
    }
    p.appendChild(tbl);
  }
  p.appendChild($(`<p class="muted" style="margin-top:10px">A claim is <b>grounded</b> when, reading down its column, the diagonal cell is the largest by a clear margin: its own ablation suppresses it more than any other claim's ablation does. When an off-diagonal cell in the column rivals the diagonal, the claim is <b>entangled</b> with that sibling (it depends on the activation, but the two claims share a direction, so the drop cannot be cleanly attributed). The random-direction null sits near zero, so it is not shown here; it only certifies that the diagonal effect is real.</p>`));
  return p;
}

function vectorPanel(r, vec){
  const p = $(`<section class="panel"><h2><span class="num">▸</span> Vectors <span class="sub2">full arrays stored on disk; magnitude profiles shown here</span></h2></section>`);
  p.appendChild(howto(`
    <p>The actual high-dimensional vectors behind this audit. Each strip is a <b>magnitude profile</b>: the ${vec.d_model}-dimensional vector's absolute values, downsampled to a sparkline so you can eyeball where its energy sits.</p>
    <ul>
      <li><b>|h|</b> - the activation under audit.</li>
      <li><b>|Δ| for claim C<i>i</i></b> - that claim's direction (from the AR), the thing we project out of <code>h</code>. ‖Δ‖ is its length; longer + more <code>h</code>-aligned generally means a bigger ablation effect.</li>
    </ul>
    <p>Everything (raw <code>h</code>, every Δ, the AR outputs, the null matrix, per-token log-probs) is saved in the per-activation <code>.npz</code> for offline reanalysis - nothing is discarded.</p>`));
  p.appendChild($(`<div class="kv"><span>d_model <b>${vec.d_model}</b></span><span>‖h‖ <b>${fmt(vec.h.norm,2)}</b></span>${vec.ar_full?`<span>‖AR(z)‖ <b>${fmt(vec.ar_full.norm,2)}</b></span>`:''}<span>marker@<b>${vec.marker_pos}</b></span></div>`));
  p.appendChild(wrapChart('|h| magnitude profile (downsampled)', 'the activation under audit', sparkSVG(vec.h.spark, '#3f6f8f')));
  (vec.deltas||[]).forEach((d,i)=>{
    const s = (r.snippet_results||[])[i];
    p.appendChild(wrapChart(`|Δ| for claim C${i} - ‖Δ‖=${fmt(d.norm,2)} · ${s?esc(s.verdict):''}`,
      s?esc(s.text.slice(0,90)):'', sparkSVG(d.spark, s&&s.verdict==='grounded'?'#4a7c59':'#a65d57')));
  });
  p.appendChild($(`<p class="muted" style="margin-top:8px">Per-activation file: <code>vectors/${r.idx}.npz</code> holds the raw <code>h</code>, every <code>Δ_i</code>, <code>AR(z)</code>, <code>AR(z\\C_i)</code>, the null matrix, and per-token log-probs under <code>h</code> and each ablation - nothing is discarded.</p>`));
  return p;
}

function wrapChart(title, sub, node){

function nullBarSVG(s){
  const W=620,H=58,padL=8,padR=8,y=30;
  const nulls = s.null_dlogps||[];
  const lo = Math.min(0, s.dlogp==null?0:s.dlogp, ...nulls, s.null_thr==null?0:s.null_thr);
  const hi = Math.max(0.5, s.dlogp==null?0:s.dlogp, ...nulls, s.null_thr==null?0:s.null_thr)*1.08;
  const x = v => padL + (v-lo)/(hi-lo)*(W-padL-padR);
  const el = svg('svg',{viewBox:`0 0 ${W} ${H}`, width:'100%', height:H});
  // zero line
  el.appendChild(svg('line',{x1:x(0),y1:8,x2:x(0),y2:H-8,class:'gridln'}));
  // null band (min..thr)
  if(nulls.length){
    const nmin=Math.min(...nulls);
    const band=svg('rect',{x:x(nmin),y:y-9,width:Math.max(1,x(s.null_thr)-x(nmin)),height:18,fill:'#c9bfb0',opacity:0.35,rx:3});
    el.appendChild(band);
  }
  // threshold line
  if(s.null_thr!=null){ el.appendChild(svg('line',{x1:x(s.null_thr),y1:y-13,x2:x(s.null_thr),y2:y+13,stroke:'#8a7c66','stroke-dasharray':'3 2','stroke-width':1.4})); }
  // null sample dots
  nulls.forEach(v=> el.appendChild(svg('circle',{cx:x(v),cy:y+16,r:2.2,fill:'#9b8e78',opacity:0.7})));
  // dlogp bar
  const col = s.verdict==='grounded'?'#4a7c59':'#a65d57';
  if(s.dlogp!=null){
    const x0=x(0), x1=x(s.dlogp);
    el.appendChild(svg('rect',{x:Math.min(x0,x1),y:y-9,width:Math.max(2,Math.abs(x1-x0)),height:18,fill:col,rx:3}));
  }
  // labels
  const t1=svg('text',{x:x(s.null_thr??0)+3,y:14,class:'axislbl'}); t1.textContent='null 95%'; el.appendChild(t1);
  const t2=svg('text',{x:Math.max(padL,x(s.dlogp??0)-2),y:H-4,class:'axislbl','text-anchor':'end'}); t2.textContent='Δlogp '+nats(s.dlogp); el.appendChild(t2);
  return el;
}

function histogramSVG(h){
  const W=520,H=170,padL=34,padB=24,padT=10,padR=8;
  const el = svg('svg',{viewBox:`0 0 ${W} ${H}`, width:'100%'});

  const bw=(W-padL-padR)/n;
  el.appendChild(svg('line',{x1:padL,y1:H-padB,x2:W-padR,y2:H-padB,class:'axis'}));
  el.appendChild(svg('line',{x1:padL,y1:padT,x2:padL,y2:H-padB,class:'axis'}));

function scatterSVG(pts, pearson){
  const W=520,H=170,padL=38,padB=26,padT=10,padR=10;

  const X=v=>padL+(v-xlo)/(xhi-xlo)*(W-padL-padR), Y=v=>H-padB-(v-ylo)/(yhi-ylo)*(H-padB-padT);
  el.appendChild(svg('line',{x1:padL,y1:H-padB,x2:W-padR,y2:H-padB,class:'axis'}));

function sparkSVG(spark, color){
  const W=620,H=44,pad=2;

  const max=Math.max(...spark,1e-9), n=spark.length, bw=(W-2*pad)/n;

function tokLogpSVG(h, ab, span){
  const lo=Math.max(0,(span[0]||1)-3), hi=Math.min(h.length,(span[1]||h.length)+3);
  const W=620,H=120,padL=8,padR=8,padT=10,padB=18;
  const el=svg('svg',{viewBox:`0 0 ${W} ${H}`, width:'100%'});
  const idxs=[]; for(let i=lo;i<hi;i++) idxs.push(i);
  if(!idxs.length) return el;
  const vals=idxs.flatMap(i=>[h[i-1],ab[i-1]]).filter(v=>v!=null);
  const ylo=Math.min(...vals), yhi=Math.max(...vals, ylo+0.1);
  const X=k=>padL+k/(idxs.length-1||1)*(W-padL-padR), Y=v=>H-padB-(v-ylo)/(yhi-ylo)*(H-padT-padB);
  // shade the actual claim span
  const sLo=idxs.indexOf(span[0]), sHi=idxs.indexOf(span[1]-1);
  if(sLo>=0) el.appendChild(svg('rect',{x:X(sLo),y:padT,width:Math.max(2,X(sHi>=0?sHi:idxs.length-1)-X(sLo)),height:H-padT-padB,fill:'#e8e0d4',opacity:0.5}));
  const line=(arr,color)=>{ let d=''; idxs.forEach((i,k)=>{ const v=arr[i-1]; if(v==null) return; d+=(d?'L':'M')+X(k)+' '+Y(v)+' '; });
    el.appendChild(svg('path',{d,fill:'none',stroke:color,'stroke-width':1.6})); };
  line(h,'#4a7c59'); line(ab,'#a65d57');
  return el;
}

      V.classList.add('show');
    }
    function play(){ if(k>=toks.length-1) reset(); playing=true; PLAY.innerHTML='&#10073;&#10073; pause';
      const sp=+stage.querySelector('#wSpeed').value;
      timer=setInterval(()=>{ if(!root.isConnected){clearInterval(timer);timer=null;return;} if(!playing) return;
        if(k>=toks.length-1){ pause(); return; } step(); }, sp); }
    function pause(){ playing=false; PLAY.innerHTML='&#9654; play'; if(timer){clearInterval(timer);timer=null;} }
    function reset(){ pause(); k=-1; sumH=0; sumA=0; cols.forEach(x=>{x.classList.remove('seen','on'); x.querySelector('.bar').style.height='0';});
      V.classList.remove('show'); V.innerHTML=''; READ.textContent='press play, or step one token at a time.'; paint(); }
    stage.querySelector('#wPlay').onclick=()=>{ playing?pause():play(); };
    stage.querySelector('#wStep').onclick=()=>{ pause(); step(); };
    stage.querySelector('#wSkip').onclick=skip;
    stage.querySelector('#wReset').onclick=reset;
    paint();
  }
  render(N-1);   // default: audit the last claim (C2, grounded)
  return root;
}

// ---- aggregate rendering (fills in progressively during the mass pass) ------
function aggBar(b){ const L=b.located||0;
  const w=v=>L?Math.round(100*v/L):0;
  return `<div class="sb"><i style="width:${w(b.grounded)}%;background:${VCOLOR.grounded}"></i><i style="width:${w(b.entangled)}%;background:${VCOLOR.entangled}"></i><i style="width:${w(b.confabulated)}%;background:${VCOLOR.confabulated}"></i></div>`; }
function aggRows(obj, order, colors, dim){ return order.filter(k=>obj&&obj[k]&&obj[k].n).map(k=>{ const b=obj[k];
  const chip = dim||!colors ? `<span class="tchip dim">${esc(k)}</span>` : tchip(k, colors[k]);
  return `<tr><td>${chip}</td><td class="muted" style="white-space:nowrap">${b.located}<span style="opacity:.6">/${b.n}</span></td>
    <td style="white-space:nowrap"><b>${b.grounded_rate!=null?pct(b.grounded_rate):'–'}</b> <span class="muted" style="font-size:0.7rem">[${pct(b.lo,0)}–${pct(b.hi,0)}]</span></td>
    <td style="min-width:110px">${aggBar(b)}</td></tr>`; }).join(''); }
function aggCard(title, sub, rowsHtml){
  return `<div class="card"><h4>${title}</h4><div class="muted" style="font-size:0.75rem; margin-bottom:4px">${sub}</div>
    <table class="taxtable"><thead><tr><th>label</th><th>loc/n</th><th>grounded</th><th></th></tr></thead><tbody>${rowsHtml||'<tr><td colspan=4 class="muted">no labels yet</td></tr>'}</tbody></table></div>`; }
function crossTable(cross){
  const sups=['stated','inferable','beyond','contradicted'], verds=['grounded','entangled','confabulated'];
  let h='<table class="taxtable" style="width:auto"><thead><tr><th>verdict \\ support</th>'+sups.map(s=>`<th>${tchip(s,TAXCOL.support[s])}</th>`).join('')+'</tr></thead><tbody>';
  for(const v of verds){ h+=`<tr><td>${tchip(v, VCOLOR[v])}</td>`;
    for(const s of sups){ const n=(cross&&cross[v]?cross[v][s]:0)||0;
      const hot=(v==='grounded'&&s==='contradicted')?'box-shadow:inset 0 0 0 2px #c0392b;':
                (v==='grounded'&&s==='beyond')?'box-shadow:inset 0 0 0 2px #6d4c9f;':
                (v==='confabulated'&&s==='stated')?'box-shadow:inset 0 0 0 2px #b8860b;':'';
      h+=`<td style="text-align:right;${hot}">${n}</td>`; }
    h+='</tr>'; }
  return h+'</tbody></table>';
}

            `</div>`+

      <td><span class="tchip dim">${esc(c.kw_bucket||'')}</span></td>

      <td>${L?tchip(L.axis, TAXCOL.axis[L.axis]):tchip(null)}</td>
      <td>${L?tchip(L.support, TAXCOL.support[L.support]) + (L.evidence?`<div class="taxev">${esc(L.evidence)}</div>`:'') : tchip(null)}</td>
    </tr>`;
  }).join('');
  sec.querySelector('#tbl').innerHTML = `<div style="overflow-x:auto"><table class="taxtable">
    <thead><tr><th>#</th><th>claim</th><th>type · seg subtype</th><th>kw bucket</th><th>verdict †</th><th>entities</th>
    <th>LLM taxo</th><th>LLM axis</th><th>LLM support · evidence</th></tr></thead>
