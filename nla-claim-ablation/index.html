function helpIntro(){
  return $(`<section class="panel">
    <h2><span class="num">▸</span> How it works <span class="sub2">an intuitive guide, then every number defined</span></h2>
    <p class="lead" style="margin-top:0">An NLA has two halves. The <b>verbalizer (AV)</b> looks at a model's internal activation vector <code>h</code> and writes a few sentences about what it thinks <code>h</code> encodes. The <b>reconstructor (AR)</b> goes the other way: given text, it predicts the activation that text describes. This studio turns the two halves against each other and asks, for each sentence the verbalizer wrote: <b>did it actually read that from <code>h</code>, or is it just a plausible guess?</b></p>
    <p><b>The intuition.</b> Say the verbalizer claims "this is about a court case." To test whether it read that from <code>h</code>, we (1) find the direction in activation space that means "court case" - we ask the reconstructor how its output shifts when those words are deleted - then (2) erase exactly that direction from <code>h</code>, and (3) ask the verbalizer to read the dented activation again. If it can no longer produce "court case," the claim really lived in <code>h</code>. If it says "court case" just as readily with the direction gone, the claim never depended on <code>h</code>: the verbalizer would have said it anyway.</p>
    <p><b>The calibration problem.</b> How big a drop counts as "really lived in <code>h</code>"? Two controls answer that. The <b>null</b> erases a <em>random</em> direction instead, showing what "nothing real happened" looks like (it is tiny). <b>Specificity</b> checks that erasing claim A's direction hurts A more than it hurts claim B. A claim that beats the null and passes specificity is <b>grounded</b>; one that beats the null but fails specificity is <b>entangled</b>; one that cannot beat the null is <b>confabulated</b>. No human labels and no LLM judge enter anywhere.</p>
    <p class="muted">Use the tabs above for a worked example with real numbers, a glossary of every quantity in the studio, and the full method.</p>
  </section>`);
}

function workedExample(){
  return $(`<section class="panel" id="example">
    <h2><span class="num">▸</span> Worked example <span class="sub2">one real activation (#20 of the qwen run), three real claims, real numbers</span></h2>
    <p>This activation was taken from Qwen at the token <span class="readtok">possess</span> in a news report about a man whose firearms permits were revoked:</p>
    <div class="src">…his license to carry firearms and his permit to <span class="readtok">possess</span> them had been revoked…</div>
    <p>Injected with that activation, the verbalizer wrote three claims (these are the <em>actual</em> sentences it produced):</p>
    <ul class="exclaims">
      <li><span class="vbadge grounded">C2</span> <b>"</b>Final token "possess" ends mid-phrase ("permission to possess")… strongly expecting "firearms" or "dangerous weapons."<b>"</b></li>
      <li><span class="vbadge entangled">C1</span> <b>"</b>The sentence "…license to carry firearms and his permit to possess" is mid-clause… listing restrictions on a convicted felon's gun privileges.<b>"</b></li>
      <li><span class="vbadge confabulated">C0</span> <b>"</b>News report format with newspaper headline structure detailing a Georgia shooting incident… a celebrity's firearms conviction.<b>"</b></li>
    </ul>
    <p>We ablate each claim's direction in turn and record how much <em>every</em> claim weakens (Δlogp in nats; bigger = more suppressed). That is the <b>effect matrix</b>:</p>
    <div class="formula">                          on C0    on C1    on C2
  ablate C0  (the framing)   -0.28    -1.37    -0.49
  ablate C1  (the clause)     0.84     4.85     0.75
  ablate C2  (the token)      1.42     4.92    30.08
  null (random dir), 95th:    0.28    -0.09     0.14   <- the bar each claim must beat</div>
    <div class="wex">
      <div class="sl"><span class="n">0</span><div class="tx"><b>The null is ~0.</b> Erasing a <em>random</em> direction barely moves any claim (≤ 0.28 nats), because random directions are nearly perpendicular to <code>h</code> in 3584 dimensions. So any drop bigger than a claim's null is a real effect of removing <em>that</em> claim's direction.</div></div>
      <div class="sl"><span class="n">1</span><div class="tx"><b>C2 → grounded.</b> Read down column C2: ablating C2 itself costs 30.08 nats, while ablating C0 or C1 costs it only −0.49 and 0.75. Its own ablation dominates the column, far above its 0.14 null. The activation at "possess" genuinely encodes "&rarr; firearms/weapons." <span class="num">own vs rival = 30.08 / 0.75 ≈ 40×</span></div></div>
      <div class="sl"><span class="n">2</span><div class="tx"><b>C1 → entangled.</b> Ablating C1 costs it 4.85 nats (well past its ~0 null), so it does depend on <code>h</code>. But ablating <em>C2</em> costs C1 4.92 nats - slightly more. C1 and C2 both describe the same "permit to possess firearms" phrase, so their directions overlap and the drop cannot be credited to C1 alone. <span class="num">own vs rival = 4.85 / 4.92 ≈ 0.99 &lt; 1.5 margin</span></div></div>
      <div class="sl"><span class="n">3</span><div class="tx"><b>C0 → confabulated.</b> Ablating C0 changes it by −0.28 nats, inside its 0.28 null. Removing the "news-report framing" direction does not make the verbalizer any less likely to assert it: the "Georgia shooting / celebrity conviction" story is its narrative prior, not read from this activation (and the text does not actually support those specifics). <span class="num">Δlogp −0.28 ≤ null 0.28</span></div></div>
    </div>
    <p class="muted">So this one activation is 1 grounded + 1 entangled + 1 confabulated - the three verdicts the studio assigns. Note <b>grounded ≠ true</b>: C2 is grounded because it was causally read from <code>h</code>, regardless of whether "firearms" is literally what follows; C0 is confabulated even though it reads as plausible. Every quantity named here is defined in the Glossary tab.</p>
  </section>`);
}

// ─────────────────────────────────────────────────────────────────────────────
//  methods documentation (plain English)
// ─────────────────────────────────────────────────────────────────────────────
function methodsDocs(){
  return $(`<div class="docs" id="methods">
    <h2 class="section">How the claim-ablation test works</h2>
    <p class="lead">The goal is a faithfulness metric that needs no human labels and no knowledge of what the target model was actually computing. The trick is to make the NLA audit itself.</p>

    <h3>The problem it solves</h3>
    <p>The NLA paper has no metric for <em>faithfulness-to-activation</em>. Its three confabulation heuristics are proxies: factual accuracy measures truth-of-context (not whether the claim came from <code>h</code>); the AR's ΔMSE is the reconstructor's opinion and never closes the loop back through the verbalizer; cross-token recurrence needs a claim to repeat. A claim can be perfectly true of the surrounding text yet never have been read from this particular activation. That is exactly the case these proxies miss.</p>

    <h3>The five steps, per activation</h3>
    <div class="steps">
      <div class="step"><h4>Generate the explanation, then segment it into claims</h4><p>Inject <code>h</code> at the marked token and let the verbalizer (AV) free-run. Its explanation is then cut into claims: current runs (id ends <code>-atoms</code>) use the <b>atomic typed decomposition</b> spelled out in "How claims are segmented" below; a few older block-mode runs use a blank-line paragraph split. Either way, each claim is one assertion, tested on its own.</p></div>
      <div class="step"><h4>Define each claim's direction with the AR</h4><p>The reconstructor (AR) maps text back to a vector. For claim C, compute <code>Δ = AR(z) − AR(z without C)</code> (both AR outputs L2-normalized first, since the AR is direction-only). Δ is the direction in activation space that this claim corresponds to. This is the same difference trick the paper uses for steering, repurposed as measurement. "Ablating a claim from the AR" just means dropping that snippet from the AR's <em>input text</em> - nothing inside the AR is changed.</p></div>
      <div class="step"><h4>Ablate the direction from h</h4><p><code>h' = h − (h·Δ̂)Δ̂</code> removes that one direction (rank-1 projection). Everything else about <code>h</code> is preserved.</p></div>
      <div class="step"><h4>Re-read by teacher forcing</h4><p>Score the claim's exact tokens under <code>h</code>, then again under <code>h'</code>, with the explanation text held fixed. <code>Δlogp = logP(C|h) − logP(C|h')</code>, in nats. This needs no repetition and no LLM judge: rather than ask whether the verbalizer would <em>re-generate</em> the claim, we read the probability it assigns to the claim's already-written tokens, so the measure is defined even for a claim that appears once. The mechanics - exactly which tokens are scored and what each is conditioned on - are spelled out in <b>the next section</b>, since this is the step most worth being precise about.</p></div>
      <div class="step halt"><h4>Decide with two controls</h4><p>The <b>random-direction null</b> (R random rank-1 ablations of the same <code>h</code>) certifies the effect is real: a claim whose Δlogp stays within the null was not read from <code>h</code> at all, so it is <b>confabulated</b>. For claims that beat the null, <b>specificity</b> is judged by column dominance of the effect matrix: a claim is <b>grounded</b> only if ablating its own direction suppresses it more (by a margin) than ablating any other claim's direction does. If a sibling claim's ablation rivals it, the claim is <b>entangled</b> (it reads from <code>h</code>, but the two claims share a direction).</p></div>
    </div>

    <h3>How claims are segmented: the atomic typed decomposition</h3>
    <p class="lead">Every run in this studio whose id ends <code>-atoms</code> is segmented by the method described here. It replaced an earlier coarse paragraph split, which is kept only for a few older <b>block-mode</b> runs and is described at the end of this section.</p>

    <p><b>Why a finer cut was needed.</b> The verbalizer writes its explanation as a few sentences. Splitting that on blank lines yields only about three coarse claims per activation, and each coarse claim bundles several distinct assertions. That granularity <em>hides</em> the interesting failure: a whole paragraph can score "grounded" while a specific date, name, or predicted next-token buried inside it was confabulated. To ask the scientific question, <b>which kinds of claim does the verbalizer actually read from the activation, and which does it fill in from its prior</b>, each atomic assertion has to be isolated and tested on its own. The atomic decomposition is what makes the "What kinds of claims get grounded" panel possible.</p>

    <p><b>The method: one LLM call returns two layers, then deterministic clean-up.</b> A single call to Claude (<code>claude-sonnet-4-6</code>, temperature 0, forced to answer through one tool) segments the verbalizer's text into:</p>
    <ul>
      <li><b>Layer 1, a partition.</b> The entire explanation is tiled into a flat, non-overlapping sequence of <code>theme</code>, <code>detail</code>, and <code>connective</code> spans. "Tiling" is exact: the spans' text, concatenated in order, reproduces the input character-for-character (every space, comma, quote, and newline), so nothing is dropped or double-counted. The unit is <b>one assertion</b>: a span must be expressible as a single "The source is / is about / reads as / contains / expects ___" sentence with no second clause. A <code>theme</code> is a descriptive assertion (genre, topic, structure, era, style, what the text is doing); a <code>detail</code> is a literal (a quoted string, date, number, or an expected next token, and every quote is its own claim); a <code>connective</code> is pure glue (whitespace, punctuation, a bare "and"/"or"/"from") and is never scored.</li>
      <li><b>Layer 2, an entity overlay.</b> Separately, every specific named entity (person, place, org, title, ticker, other) is returned as a verbatim substring. This layer may overlap Layer 1 (an entity usually sits inside a theme claim, sometimes inside a quote) and does not have to tile.</li>
      <li><b>A role per content claim.</b> Each theme/detail claim is tagged <em>describes</em> (a descriptive theme), <em>quotes</em> (a literal the source contains), or <em>predicts</em> (a token the source is expected to emit next, i.e. the verbalizer's guess). The role is assigned by a deterministic rule over the claim's own wording, not a second model call, and it is the axis the "PREDICTION" bucket is built on.</li>
    </ul>

    <p><b>The exact segmentation prompt.</b> This is the verbatim system prompt, sent alongside the <code>emit_layers</code> tool; nothing else steers the cut:</p>
    <div class="formula" style="max-height:360px; overflow:auto">You are a claim segmenter for a mechanistic-interpretability experiment. The input is a
short description written by a "verbalizer" model describing ONE internal neural activation. Produce
TWO layers.

LAYER 1 - PARTITION ("segments"): tile the ENTIRE input into a FLAT, NON-OVERLAPPING sequence of
theme / detail / connective spans whose "text" concatenated in order reproduces the input
character-for-character (every space, comma, quote, newline). Segments never overlap and never nest.
  THE UNIT: one claim = ONE assertion about the source. Boundary test: a claim is expressible as a
  SINGLE sentence "The source &lt;is / is about / reads as / contains / expects&gt; ___" making exactly ONE
  assertion (no "and", no second independent clause). Split a span that packs two assertions; keep a
  span that splitting would break.
  - theme: a descriptive assertion about the source (genre / topic / structure / era / style /
    implication / what it is doing). Named things (people, places, orgs, tickers, titles) STAY inside
    the theme claim they belong to; do NOT pull them out here (they go in Layer 2).
  - detail: a literal - a quoted string, date, number or value. EVERY quoted string is its OWN detail
    claim (never group two quotes), but a quote plus the short phrase describing THAT one quote is one
    claim. A quote the source CONTAINS and a token the source is EXPECTED to emit next are BOTH detail.
  - connective: PURE glue only (whitespace, punctuation, bare "and" / "or" / "/" / "from" / "with" /
    "," / ":"). A hedge word is NEVER connective (it belongs to the claim it modifies -> record it in
    "hedged"). A phrase that makes an assertion is NEVER connective.
  For every theme/detail claim return "assertion" (the single "The source ..." sentence) and "hedged"
  (qualifier words inside it, e.g. likely / probably / expecting; empty if none).

LAYER 2 - ENTITY OVERLAY ("entities"): SEPARATELY, list every specific NAMED ENTITY mentioned anywhere
in the input - person / place / org / title / ticker / other. Return each as a verbatim substring; it
MAY (and usually will) sit inside a Layer-1 segment, including inside a quoted string. This layer
OVERLAPS Layer 1 and does not have to tile. Only specific named referents (e.g. "Georgia",
"Glencore PLC", "NYSE: GKG", "the Indians") - never generic nouns.

Layer-1 tiling is mandatory and exact. Respond via emit_layers only.</div>
    <p>The tool it must answer through, <code>emit_layers</code>, carries two arrays: <code>segments</code> (each with <code>text</code>, <code>type</code>, <code>subtype</code>, the "The source ..." <code>assertion</code>, and any <code>hedged</code> qualifier words) and <code>entities</code> (each <code>text</code> plus <code>subtype</code>). After the call, three deterministic passes finish the job with no further model use: any characters the model skipped are <b>gap-filled as connective</b> so the partition tiles exactly; a bare hedge word left as its own connective (e.g. "likely") is <b>folded back into the claim it modifies</b> and recorded in <code>hedged</code>; and each entity is located by <b>word-boundary match</b> (so "STEF" is not matched inside "STEFANIE") and attached to its smallest containing claim. A stdlib regex independently flags dates/numbers so a <code>detail</code> can be marked <code>regex-confirmed</code>.</p>

    <div class="note"><b>The segmenter is a language model, yet the test stays judge-free.</b> This is the one place an LLM enters the pipeline, and it is confined to deciding <em>where one claim ends and the next begins</em>. It runs at temperature 0, it only ever emits character-exact spans of the verbalizer's own words, and crucially <b>it never sees the activation <code>h</code></b>, so it cannot know, and cannot encode an opinion about, whether any claim is faithful. Groundedness is still decided entirely by the teacher-forced log-probability test above. A segmentation choice can move where a boundary falls; it can never leak into a verdict.</div>

    <p><b>What changes downstream, and what does not.</b> Only two mechanics differ from block mode; injection, teacher forcing, and the random-direction null are identical, so atom and block records stay comparable. First, a tiling cannot be rebuilt by re-joining snippets, so a claim's direction is taken by <b>deleting its characters</b> and re-encoding: <code>Δ = normalize(AR(full text)) − normalize(AR(text with the claim deleted))</code>. Second, with dozens of claims per activation the specificity test needs a scale-stable denominator (a 90th-percentile rule with a 1-nat floor; see the research note), which is why atom-mode grounded rates are <em>not</em> comparable to the block 63.5% headline. Only <code>theme</code> and <code>detail</code> claims are scored; connectives are shown but excluded, and entities are folded into the claim that contains them.</p>

    <p><b>The payoff.</b> Because every claim now carries a type, a role, and a subtype, the run page can bucket verdicts by <em>what each claim is about</em>. The recurring, cross-model finding is that <b>GIST</b> (genre, topic, tone, style) is read from <code>h</code>, while <b>POSITION / STRUCTURE</b> and next-token <b>PREDICTION</b> are largely confabulated from the prior. That breakdown is the "What kinds of claims get grounded" panel, and it is the question the coarse block split could not even pose.</p>

    <h4 class="docsub">The original coarse method (block mode)</h4>
    <p>A few older runs (their claims carry no type chip) use the first, simpler segmentation, with <b>no model at all</b>: the verbalizer was trained to write one observation per paragraph inside an <code>&lt;explanation&gt;…&lt;/explanation&gt;</code> block, so the text is split on blank lines and each non-empty paragraph <em>is</em> one claim, by a single regular expression. It is fully judge-free but coarse (about three claims per activation, each bundling several assertions), and an activation with fewer than two paragraphs is skipped for want of a sibling to measure specificity against. Block mode is preserved so its published 63.5%-grounded baseline stays reproducible; the atomic method above supersedes it for every new run.</p>

    <h3>The log-probability measurement, taught from scratch</h3>
    <p class="lead">This is the engine of the whole test, so here it is built up one idea at a time, with a single running example carried all the way through. If you already know how a language model assigns probabilities to tokens, skim the first two pieces.</p>
    <p>Throughout, the model doing the "reading" is the <b>verbalizer (AV)</b>, and our running claim is the grounded one from the Worked example tab: at the token <span class="readtok">possess</span>, the verbalizer wrote that the activation is <em>"strongly expecting firearms."</em> We will measure whether that claim really came from the activation.</p>

    <div class="steps">
      <div class="step"><h4>What one token's log-probability is</h4><p>At every position, a language model outputs a probability for each possible next token. The <b>log-probability</b> is just the natural log of the probability it gave to one specific token. It is always ≤ 0: a token the model finds obvious sits near 0, a token it finds surprising is far below 0. <span class="ex">Example: as the verbalizer writes its claim and reaches the word <code>firearms</code>, suppose it assigns that word probability 0.55. Then that token's log-prob is ln(0.55) = −0.6 (a fairly expected word). A word it thought wildly unlikely, say probability 0.001, would score ln(0.001) = −6.9.</span></p></div>

      <div class="step"><h4>Scoring a whole claim: add up the logs</h4><p>The probability of a sequence of tokens is the product of each token's probability given the ones before it (the chain rule). Taking logs turns that product into a <b>sum</b>, which is what we use. So the "score" of a claim is the sum of the log-probabilities of its tokens, each conditioned on everything to its left. <span class="ex">A two-word fragment like <code>expecting firearms</code> is two such numbers added together; the full claim is just more of them.</span></p></div>

      <div class="step"><h4>Teacher forcing: supply the words, measure their probability</h4><p>When a model <em>generates</em>, it picks a token, feeds its own pick back in, and continues. We do the opposite, called <b>teacher forcing</b>: the verbalizer already wrote the claim once, so we hold those exact tokens fixed and, at each position, force the known next token and record the probability the model would have given it. One forward pass produces all those numbers at once. <span class="ex">We are not asking the verbalizer to say the claim again; we are asking how strongly it believed the claim it already wrote.</span> This is why a claim that appears only once still gives a clean, repeatable number, and why no second model or LLM judge is ever needed.</p></div>

      <div class="step"><h4>Where the activation comes in</h4><p>The sequence we score is the verbalizer's prompt followed by its explanation, with the activation <code>h</code> written into one marked position in the prompt (the same injection used to generate the explanation). That injected <code>h</code> is the <em>only</em> thing carrying the target model's internal state into the scoring. Everything else is plain text.</p></div>

      <div class="step halt"><h4>Do it twice and subtract: that is Δlogp</h4><p>Score the claim's tokens <b>once with the real <code>h</code></b> injected, then <b>again with <code>h'</code></b> (the same <code>h</code> but with this claim's direction removed). The difference, <code>Δlogp = score(claim | h) − score(claim | h')</code>, is how many nats of probability the claim loses when its substrate is taken away. <span class="ex">Near 0 → the claim did not need <code>h</code> (confabulated). Large and positive → it did (grounded, if it also passes specificity).</span></p></div>
    </div>

    <h4 class="docsub">Which tokens go into the sum? (the question you asked)</h4>
    <p><b>Only the one claim's own tokens.</b> Not the prompt, and not the other claims. Each claim owns a separate, non-overlapping stretch of the sequence and is scored on that stretch alone. We locate the claim's sentence(s) inside the explanation, map that character range to its tokens, and sum the log-probs of exactly those. (If a claim's text cannot be found in the sequence, it is marked <em>unlocated</em> and skipped, never guessed at.)</p>
    <div class="formula"> one forward pass over the whole fixed sequence (no text is ever edited):

   [ verbalizer prompt ..... &lt;h injected here&gt; ..... ]   &larr; prompt: never scored
   [ claim C0 tokens ][ claim C1 tokens ][ claim C2 tokens ]   &larr; the explanation

 to score claim C1 we sum ONLY its own tokens, and each token is conditioned on
 everything to its left: the prompt, the injected vector, ALL of C0, and C1's
 own earlier tokens (C2 is to the right, so it never enters C1's score).

   logp(token_t) = log P( token_t | prompt, h, C0, C1's earlier tokens )

   score(C1 | h)  = sum of logp(token_t) over every token t in C1
   score(C1 | h') = the same sum, with h replaced by h'
                    (C1's direction removed; prompt, C0, and C1's tokens stay identical)

   Δlogp(C1) = score(C1 | h) − score(C1 | h')</div>

    <h4 class="docsub">The same example, worked end to end</h4>
    <p>Take just the two-token fragment <code>expecting firearms</code> from our running claim. With the real activation injected the verbalizer is happy to predict "firearms"; once that direction is removed it is shocked by the very same word. Illustrative numbers, but the shape is the real one:</p>
    <div class="formula"> with h injected (the real activation):
     "expecting"   P = 0.40    logP = -0.92
     " firearms"   P = 0.50    logP = -0.69
     score(claim | h)   =  -0.92 + (-0.69)  =  -1.61

 with h' (the "firearms" direction removed):
     "expecting"   P = 0.30    logP = -1.20
     " firearms"   P = 0.001   logP = -6.91     &larr; now shocked by "firearms"
     score(claim | h')  =  -1.20 + (-6.91)  =  -8.11

 Δlogp  =  score(h) - score(h')  =  -1.61 - (-8.11)  =  6.5 nats</div>
    <p>That 6.5 nats is for a two-token slice. Over the full (longer) claim these per-token gaps accumulate to the <b>30.08 nats</b> reported for this exact claim in the Worked example tab. Every activation page draws this token by token: a <b>per-token chart</b> with each token's logP under <code>h</code> (green) versus under <code>h'</code> (red), so you can see precisely where in the sentence the activation was load-bearing.</p>

    <h4 class="docsub">So what happens to C0 and C2 while C1 is scored?</h4>
    <p><b>The text never changes; only the injected vector does.</b> This is the crux, so here it is stated flatly: in every forward pass the full explanation <code>C0 C1 C2</code> is present, verbatim and in order. The phrase "ablate a claim" means editing the injected activation <code>h</code>, not deleting any words. So C0 is never skipped or removed when we score C1. It stays in the sequence and forms part of the left context that C1 is conditioned on (and C1 in turn is part of C2's context).</p>
    <p>Walking your <code>C0 C1 C2</code> example through the two passes:</p>
    <ul>
      <li><b>Pass 1, under the real <code>h</code>.</b> One forward returns a log-prob for every token, so it hands us C0's score, C1's score, and C2's score together. To read "C1's score" we sum the log-probs over C1's own tokens and leave the rest out of the sum. The C0 and C2 tokens are still physically there; we just do not add them into C1's number. This is exactly what you described: read the probability of C1's tokens, as they were actually written, given the real C0 sitting before them.</li>
      <li><b>Pass 2, under <code>h'</code></b> (which is <code>h</code> with C1's direction projected out; the text is still untouched). C1's <code>Δlogp</code> is C1's score in pass 1 minus C1's score in pass 2.</li>
    </ul>
    <p><b>Now the part you asked about: yes, C0 and C2 can move too.</b> When we swap <code>h</code> for <code>h'</code> to test C1, the log-probs of C0 and C2 may also change, because they can draw on <code>h</code> as well. We keep those changes on purpose: recording, for each ablation, the effect on <em>every</em> claim is what produces the <b>effect matrix</b>. Each row is the claim whose direction we removed; each column is whose score then moved.</p>
    <div class="formula">                          on C0    on C1    on C2
  ablate C0  (the framing)   -0.28    -1.37    -0.49
  ablate C1  (the clause)     0.84     4.85     0.75
  ablate C2  (the token)      1.42     4.92    30.08
  null (random dir), 95th:    0.28    -0.09     0.14</div>
    <p>A claim is judged by reading down its own <em>column</em> and comparing the diagonal entry (its own ablation) against the rest of that column:</p>
    <ul>
      <li><b>C2 is grounded.</b> Removing C2's direction costs C2 <b>30.08</b> nats, while removing any other claim's direction barely touches C2 (−0.49 and 0.75). Its own direction, and only its own, carries it: the diagonal dominates the column.</li>
      <li><b>C1 is entangled, not grounded.</b> Removing C1's direction costs C1 4.85 nats, well above its null, so C1 does depend on <code>h</code>. But removing <em>C2's</em> direction costs C1 <b>4.92</b> nats, slightly more. Since another claim's ablation moves C1 as much as its own does, the 4.85 cannot be credited to C1 alone: C1 and C2 lean on an overlapping direction (they describe the same "permit to possess firearms" phrase). The diagonal does not dominate the column.</li>
      <li><b>C0 is confabulated.</b> Removing C0's direction moves C0 by only −0.28 nats, inside its random-direction null (0.28). Nothing we take out of <code>h</code> makes the verbalizer less willing to assert C0, so C0 was not read from <code>h</code>.</li>
    </ul>
    <p>So "the other claims are also altered" is not noise to be removed; it is the measurement. A grounded claim is one whose own ablation dominates its column of this matrix; a claim that some sibling's ablation damages just as much is entangled.</p>

    <h4 class="docsub">Three details that matter</h4>
    <p><b>1. What each token is conditioned on.</b> Every token in the claim is scored given its true left context: the prompt, the injected activation, <em>and</em> all earlier explanation text, including earlier claims. We are not re-deriving the claim from nothing; we ask, with the exact context the verbalizer itself produced, how much the injected activation adds to the probability of <em>this</em> claim's tokens. Because only <code>h</code> changes between the two passes, <code>Δlogp</code> isolates the activation's contribution with the wording and context held constant.</p>
    <p><b>2. Why a sum and not an average.</b> The score is a sum over the claim's tokens (the joint log-probability of its exact string), so a longer claim can accumulate a bigger number. To keep claims comparable the studio also shows <code>Δlogp ÷ span length</code>, and the random-direction <b>null</b> (below) is computed on the very same span, so each claim's bar is self-calibrated to that claim's own length and fragility.</p>
    <p><b>3. The cost.</b> Because one pass scores every claim at once (see the section above), auditing an <em>n</em>-claim activation takes <code>1 + n + R</code> passes in total: one baseline under <code>h</code>, one per ablated claim, and <code>R</code> random-direction nulls. Never two passes per claim.</p>

    <div class="note"><b>Why <code>h'</code> is renormalized - it makes Δlogp a <em>direction</em> signal.</b> Projecting a direction out of <code>h</code> shortens it, and the injector always rescales whatever vector it writes back to the model's training norm (<code>injection_scale</code>). So after ablation <code>h'</code> is renormalized to the same length as <code>h</code>: the ablation is effectively a <em>rotation</em> of the injected direction, not a shrinking of its magnitude. This is deliberate. It keeps both forwards on the exact norm the verbalizer was trained to expect, so <code>Δlogp</code> reflects <em>which content direction</em> was removed, not a trivial drop in vector size that would depress every token's probability at once. (It also means the ablation strength <code>α</code> is a rotation angle: <code>α=1</code> fully removes the claim's component, <code>α=2</code> reflects across it.)</div>

    <h3>What the verdicts mean</h3>
    <div class="formula">depends_on_h  Δlogp_i &gt; null_95th(h,i)                  the effect beats a random direction
specific      Δlogp_i &gt; margin × max_{k≠i} effect(ablate C_k on C_i)   own ablation dominates its column

grounded      depends_on_h AND specific
entangled     depends_on_h AND NOT specific      reads from h, but its direction overlaps a sibling claim
confabulated  NOT depends_on_h                   within the random-direction null: not read from h
unlocated     the claim's tokens were not found in the teacher-forced sequence</div>
    <p>"Confabulated" is a causal statement, not an accusation of falsehood: the claim may well be true of the text, but the verbalizer did not derive it from this activation. That separation, <b>grounded ≠ true</b>, is the headline the metric is built to expose. "Entangled" is the honest middle: the claim does depend on the activation, but its AR direction is not separable from a neighboring claim's, so grounding cannot be cleanly attributed.</p>
    <div class="note"><b>Why column dominance, not "off-diagonal ≈ 0".</b> Random directions in the 3584-dimensional activation space are nearly orthogonal to <code>h</code>, so ablating one barely changes the renormalized injection and the random-direction null sits near zero. The AR-defined claim directions, by contrast, are aligned with <code>h</code>, so every real ablation moves the read somewhat. Testing specificity by requiring the off-diagonal collateral to fall inside that ~zero null would reject every claim. The correct test is relative: does a claim's own ablation dominate its column of the effect matrix? This was confirmed on the first GPU smoke, where all three claims beat the null by 11-32 nats but differed in column dominance.</div>

    <h3>The free cross-check</h3>
    <p>For each claim we also record <code>ΔMSE = MSE(AR(z\\C), h) − MSE(AR(z), h)</code> from vectors already computed. The paper observes that removing a true claim hurts AR reconstruction. If our causal Δlogp and the AR's ΔMSE agree (positive correlation), two independent signals point the same way. They are shown together on every run's scatter plot.</p>

    <div class="note"><b>Reading the studio.</b> The experimental map lists every run and its causally-grounded-claim rate. A run page shows the corpus result and a grid of audited activations. Each activation page shows the source text, the color-coded explanation, and - per claim - the Δlogp-vs-null bar, the per-token probability gap, the specificity matrix, and the stored vectors. Everything is read from run artifacts on disk; nothing is recomputed in the browser.</p></div>
  </div>`);
