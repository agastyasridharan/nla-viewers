<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>A New Warm-Start — NLA De-confabulation Findings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --ink:#1a1a1a; --muted:#6b6b6b; --faint:#9a948a; --line:#e3e0d8; --bg:#faf8f3;
          --panel:#fff; --accent:#7a2e2e;
          --green:#2e6b4f; --amber:#c0892e; --red:#b5552e; --grey:#8a8a8a; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font-family:'EB Garamond',Georgia,serif; font-size:18px; line-height:1.55;
         -webkit-font-smoothing:antialiased; }
  .wrap { max-width:920px; margin:0 auto; padding:64px 28px 110px; }
  a { color:var(--accent); }
  code, .mono { font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace; font-size:.84em; }
  h1 { font-size:2.6rem; font-weight:600; margin:0 0 .15em; letter-spacing:-.01em; line-height:1.1; }
  .subtitle { color:var(--muted); font-size:1.16rem; margin:0 0 1.1em; max-width:42em; }
  .meta-line { color:var(--faint); font-size:.92rem; margin:0 0 2.4em; }
  .meta-line span { margin-right:1.3em; }
  h2 { font-size:1.6rem; font-weight:600; margin:2.6em 0 .1em; }
  h2 .num { color:var(--faint); font-weight:500; margin-right:.4em; }
  .sec-sub { color:var(--muted); margin:.1em 0 1.2em; font-size:1.02rem; }
  .headline { background:#fffdf8; border:1px solid var(--line); border-left:4px solid var(--accent);
              border-radius:9px; padding:20px 24px; margin:1.4em 0 .4em; font-size:1.12rem; }
  .headline b { color:var(--accent); }
  .qbox { color:var(--muted); font-style:italic; margin:.7em 0 0; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:10px;
           padding:20px 22px; margin:0 0 16px; }
  ul.clean { margin:.2em 0; padding-left:1.2em; }
  ul.clean li { margin:.35em 0; }
  table { border-collapse:collapse; width:100%; font-size:.96rem; margin:.3em 0; }
  th, td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
  th { color:var(--muted); font-weight:600; font-size:.86rem; text-transform:uppercase; letter-spacing:.03em; }
  td.num, th.num { text-align:right; font-variant-numeric:tabular-nums; }
  .swatch { display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:7px; vertical-align:baseline; }
  .arm-tag { font-size:.82rem; color:var(--muted); }
  /* arms legend */
  .legend { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; margin:.4em 0 0; }
  .legend .arm { border:1px solid var(--line); border-radius:9px; padding:13px 15px; background:var(--panel); border-top:3px solid #ccc; }
  .legend .arm h4 { margin:0 0 .25em; font-size:1.05rem; }
  .legend .arm p { margin:0; color:var(--muted); font-size:.92rem; line-height:1.4; }
  /* findings */
  .find { border:1px solid var(--line); border-radius:9px; padding:15px 18px; margin:0 0 12px; background:var(--panel); }
  .find h3 { margin:0 0 .3em; font-size:1.14rem; color:var(--accent); }
  .find p { margin:0; font-size:1rem; }
  /* training detail */
  h3.subh { font-size:1.18rem; font-weight:600; margin:1.4em 0 .5em; }
  .pipe { display:flex; flex-direction:column; gap:0; }
  .pstep { display:flex; gap:14px; padding:11px 0; border-bottom:1px solid var(--line); }
  .pstep:last-child { border-bottom:none; }
  .pnum { flex:0 0 118px; font-family:'IBM Plex Mono',monospace; font-size:.82rem; font-weight:500; color:var(--accent); }
  .pbody { flex:1; font-size:.96rem; }
  .pio { font-family:'IBM Plex Mono',monospace; font-size:.78rem; color:var(--faint); margin-left:.4em; }
  .pwhat { color:var(--muted); }
  .promptbox { background:#f4f1ea; border:1px solid var(--line); border-radius:7px; padding:11px 13px;
               font-family:'IBM Plex Mono',monospace; font-size:.8rem; white-space:pre-wrap; line-height:1.45; margin:.2em 0 1em; overflow:auto; }
  .plabel { font-size:.86rem; color:var(--muted); font-weight:600; margin:.4em 0 .25em; }
  .datanote { font-size:.9rem; color:var(--muted); margin:.4em 0 0; }
  /* stacked bars */
  .bars { margin:.4em 0; }
  .barrow { display:flex; align-items:center; gap:12px; margin:9px 0; }
  .barrow .lab { flex:0 0 165px; font-size:.95rem; }
  .barrow .track { flex:1; height:24px; border-radius:5px; overflow:hidden; display:flex; background:#eee; border:1px solid var(--line); }
  .barrow .track > div { height:100%; }
  .barrow .gr { flex:0 0 86px; text-align:right; font-variant-numeric:tabular-nums; font-weight:600; }
  .legend-inline { font-size:.85rem; color:var(--muted); margin:.3em 0 0; }
  .legend-inline b { font-weight:600; }
  /* chart */
  .chart { width:100%; height:auto; display:block; }
  .chart text { font-family:'IBM Plex Mono',monospace; fill:var(--muted); }
  .clegend { display:flex; gap:18px; flex-wrap:wrap; font-size:.9rem; margin:.5em 0 0; }
  .clegend span { display:inline-flex; align-items:center; }
  /* badges */
  .badge { display:inline-block; font-size:.74rem; font-weight:600; padding:2px 9px; border-radius:20px;
           color:#fff; text-transform:uppercase; letter-spacing:.04em; }
  .badge.grounded{ background:var(--green); } .badge.mixed{ background:var(--amber); }
  .badge.confabulated{ background:var(--red); } .badge.unknown{ background:var(--grey); }
  /* example browser */
  .navwrap { margin:.2em 0 1em; }
  .navrow { display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin:6px 0; }
  .navrow .navlab { flex:0 0 78px; color:var(--muted); font-size:.85rem; }
  .navbtn { font-family:'IBM Plex Mono',monospace; font-size:.8rem; border:1px solid var(--line);
            background:var(--panel); border-radius:6px; padding:5px 9px; cursor:pointer; color:var(--ink); }
  .navbtn:hover { border-color:var(--accent); }
  .navbtn.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  .navbtn.teach::after { content:" \2605"; color:var(--amber); }
  .navbtn.on.teach::after { color:#ffd; }
  .exhead { font-size:.9rem; color:var(--muted); margin:.2em 0 .5em; }
  .ctx { background:#f4f1ea; border:1px solid var(--line); border-radius:8px; padding:13px 15px;
         font-size:.92rem; max-height:230px; overflow:auto; white-space:pre-wrap; line-height:1.5; }
  .ctx .tail { background:#fff2cc; padding:0 2px; }
  .armgrid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:14px 0 0; }
  @media (max-width:680px){ .armgrid{ grid-template-columns:1fr; } }
  .armcard { border:1px solid var(--line); border-radius:9px; padding:13px 15px; background:var(--panel); border-top:3px solid #ccc; }
  .armcard .top { display:flex; justify-content:space-between; align-items:center; gap:8px; margin:0 0 .4em; }
  .armcard .top h4 { margin:0; font-size:1.02rem; }
  .armcard .fve { font-size:.82rem; color:var(--muted); font-variant-numeric:tabular-nums; }
  .armcard .style { font-size:.78rem; color:var(--faint); margin:0 0 .4em; }
  .armcard .ws { font-size:.9rem; color:var(--muted); border-left:2px solid var(--line); padding-left:9px; margin:.3em 0; }
  .armcard .ws b { color:var(--faint); font-style:normal; }
  .armcard .gen { font-size:.95rem; margin:.3em 0; }
  .armcard .confab { margin:.45em 0 0; font-size:.85rem; }
  .armcard .confab .ch { display:block; color:var(--red); background:#fbeee8; border-radius:4px;
                         padding:2px 7px; margin:3px 0; }
  details.samples { margin:.5em 0 0; font-size:.88rem; }
  details.samples summary { cursor:pointer; color:var(--accent); }
  details.samples .s { border-top:1px dashed var(--line); padding:5px 0; color:var(--muted); }
  footer { margin-top:4em; padding-top:1.4em; border-top:1px solid var(--line); color:var(--muted); font-size:.9rem; }
  .err { color:var(--red); font-family:monospace; white-space:pre-wrap; }
  /* eval-suite reproduction */
  .tagpill { display:inline-block; font-size:.7rem; font-weight:600; padding:2px 8px; border-radius:20px;
             color:#fff; white-space:nowrap; letter-spacing:.02em; }
  .reval { border:1px solid var(--line); border-radius:10px; padding:16px 19px; margin:0 0 16px; background:var(--panel); }
  .reval .ev-head { font-size:1.12rem; margin:0 0 .3em; display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
  .reval .ev-what { color:var(--muted); font-size:.96rem; margin:.2em 0 .7em; }
  .reval .ev-headline { background:#fffdf8; border-left:3px solid var(--accent); border-radius:6px;
                        padding:10px 14px; font-size:1.0rem; margin:.2em 0 .6em; }
  .reval .ev-metric { font-size:.88rem; color:var(--muted); margin:.2em 0 .5em; }
  .evtable tr.hl td { background:#eef5f0; }
  .evtable td.best { color:var(--green); font-weight:600; }
  .exclaims { margin:10px 0 0; }
  .exclaim-arm { margin:.5em 0; }
  .exclaim-arm .alab { font-size:.82rem; color:var(--faint); margin:0 0 .2em; }
  .chip { display:inline-block; font-size:.8rem; border-radius:5px; padding:2px 7px; margin:2px 3px 2px 0; line-height:1.3; }
  .chip .sp { font-size:.66rem; text-transform:uppercase; opacity:.7; margin-right:.3em; letter-spacing:.04em; }
  .chip-true { background:#e9f3ec; color:#235; border:1px solid #cfe6d6; }
  .chip-fr { background:#fcf3e2; color:#5a4520; border:1px solid #ecd9b3; }
  .chip-fu { background:#fbeae6; color:#6a2a1e; border:1px solid #efc9bd; }
  .framebadge { display:inline-block; font-size:.72rem; font-weight:600; padding:2px 8px; border-radius:5px; color:#fff; }
  .fb-eval { background:var(--accent); } .fb-deploy { background:var(--green); }
  .catsec { font-weight:600; font-size:1.04rem; margin:1.3em 0 .2em; padding-bottom:.2em; border-bottom:2px solid var(--line); }
  .catrow { display:grid; grid-template-columns:1fr 64px 190px; gap:10px; align-items:start;
            padding:9px 4px; border-bottom:1px solid var(--line); font-size:.95rem; }
  .catrow .cn { font-weight:500; }
  .catrow .cwhy { color:var(--faint); font-size:.82rem; font-weight:400; margin:.15em 0 0; }
  .catrow .cp { color:var(--faint); font-size:.8rem; text-align:right; }
  .catrow .ct { text-align:right; }
  @media (max-width:680px){ .catrow{ grid-template-columns:1fr; } .catrow .cp,.catrow .ct{ text-align:left; } }
</style>
</head>
<body>
  <div class="wrap" id="app"><p class="err" id="boot">Loading findings…</p></div>

  <script src="deconf_data.js"></script>
  <script>
  "use strict";
  var DV = {};
  (function () {
    function esc(s){ return String(s==null?"":s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
    var ARMC = {};        // arm key -> color
    var ARMLAB = {};      // arm key -> label
    var ARMORDER = [];

    function vClass(v){ return ({grounded:"grounded",mixed:"mixed",confabulated:"confabulated"})[v] || "unknown"; }

    // ---- FVE-vs-step line chart (SVG string) ----
    function lineChart(D){
      var W=860,H=300,padL=44,padR=14,padT=14,padB=34;
      var xmax=500, ymin=0, ymax=70;
      function X(s){ return padL + (s/xmax)*(W-padL-padR); }
      function Y(v){ return padT + (1-(v-ymin)/(ymax-ymin))*(H-padT-padB); }
      var g="";
      // gridlines y
      [0,20,40,60].forEach(function(yv){
        var y=Y(yv);
        g+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="#e8e4db"/>';
        g+='<text x="'+(padL-8)+'" y="'+(y+4)+'" text-anchor="end" font-size="11">'+yv+'%</text>';
      });
      [0,100,200,300,400,500].forEach(function(xv){
        var x=X(xv);
        g+='<text x="'+x+'" y="'+(H-12)+'" text-anchor="middle" font-size="11">'+xv+'</text>';
      });
      g+='<text x="'+(padL+(W-padL-padR)/2)+'" y="'+H+'" text-anchor="middle" font-size="11">RL step</text>';
      ARMORDER.forEach(function(k){
        var pts=D.training.trajectories[k]||[];
        var d=pts.filter(function(p){return p[1]!=null;})
                 .map(function(p){return X(p[0]).toFixed(1)+","+Y(p[1]).toFixed(1);}).join(" ");
        g+='<polyline points="'+d+'" fill="none" stroke="'+ARMC[k]+'" stroke-width="1.7" opacity="0.92"/>';
      });
      return '<svg class="chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" role="img" aria-label="FVE versus RL step">'+g+'</svg>';
    }

    // ---- grounded-rate stacked bars ----
    function bars(D){
      var h="";
      D.grounded.forEach(function(r){
        var tot=r.total||18;
        function seg(n,c){ return n>0 ? '<div style="width:'+(n/tot*100)+'%;background:'+c+'"></div>' : ""; }
        h+='<div class="barrow">'+
             '<div class="lab"><span class="swatch" style="background:'+ARMC[r.arm]+'"></span>'+esc(ARMLAB[r.arm])+'</div>'+
             '<div class="track">'+seg(r.grounded,"var(--green)")+seg(r.mixed,"var(--amber)")+seg(r.confab,"var(--red)")+'</div>'+
             '<div class="gr">'+r.grounded_rate.toFixed(3)+'</div>'+
           '</div>';
      });
      h+='<div class="legend-inline"><b style="color:var(--green)">grounded</b> &middot; '+
         '<b style="color:var(--amber)">mixed</b> (grounded core + a fabricated specific) &middot; '+
         '<b style="color:var(--red)">confabulated</b> &nbsp;|&nbsp; bar = 18 examples; number = grounded-rate (grounded + ½·mixed)/total</div>';
      return h;
    }

    // ---- how each arm is trained ----
    function trainingDetail(D){
      var T=D.training_detail; if(!T) return "";
      var h='<p class="sec-sub">'+esc(T.intro)+'</p>';
      h+='<div class="panel"><div class="pipe">';
      T.pipeline.forEach(function(p){
        h+='<div class="pstep"><div class="pnum">'+esc(p.stage)+'</div><div class="pbody">'+
           '<b>'+esc(p.name)+'</b><span class="pio">'+esc(p.io)+'</span><br>'+
           '<span class="pwhat">'+esc(p.what)+'</span></div></div>';
      });
      h+='</div></div>';
      h+='<h3 class="subh">Hyperparameters</h3>'+
         '<table><thead><tr><th>Phase</th><th>Trainable</th><th>LR</th><th>Batch</th><th>Steps</th><th>Notes</th></tr></thead><tbody>'+
         T.hparams.map(function(r){return '<tr><td><b>'+esc(r.phase)+'</b></td><td>'+esc(r.adapter)+'</td><td>'+esc(r.lr)+
           '</td><td>'+esc(r.batch)+'</td><td>'+esc(r.steps)+'</td><td>'+esc(r.notes)+'</td></tr>';}).join("")+'</tbody></table>';
      h+='<h3 class="subh">Architecture &amp; objective</h3><div class="panel"><ul class="clean">'+
         T.architecture.map(function(a){return "<li>"+esc(a)+"</li>";}).join("")+'</ul>'+
         '<p style="margin:.6em 0 0">'+esc(T.objective)+'</p></div>';
      h+='<h3 class="subh">The one difference: each arm&#39;s warm-start</h3><div class="armgrid">';
      T.per_arm.forEach(function(p){
        h+='<div class="armcard" style="border-top-color:'+(ARMC[p.arm]||"#ccc")+'">'+
           '<div class="top"><h4>'+esc(ARMLAB[p.arm]||p.arm)+'</h4></div>'+
           '<div class="style">'+esc(p.title)+'</div><div class="gen">'+esc(p.recipe)+'</div></div>';
      });
      h+='</div>';
      h+='<h3 class="subh">The exact prompts</h3><div class="panel">'+
         '<div class="plabel">Actor (AV) &mdash; reads the injected activation:</div>'+
         '<pre class="promptbox">'+esc(T.actor_prompt)+'</pre>'+
         '<div class="plabel">Critic (AR) &mdash; reconstructs the activation from the explanation:</div>'+
         '<pre class="promptbox">'+esc(T.critic_prompt)+'</pre>'+
         '<p class="datanote">'+esc(T.data_note)+'</p></div>';
      return h;
    }

    // ---- one example detail ----
    DV.show = function(gi){
      var D=window.DECONF, ex=D.examples[gi];
      var host=document.getElementById("ex-detail");
      if(!ex||!host) return;
      // nav active state
      var btns=document.querySelectorAll(".navbtn");
      for(var b=0;b<btns.length;b++){ var on=(btns[b].getAttribute("data-gi")==String(gi));
        if(on) btns[b].classList.add("on"); else btns[b].classList.remove("on"); }
      var ctx=esc(ex.context);
      // highlight the activation-local tail (after an elision marker if present)
      var mark=ctx.indexOf("[middle elided]");
      if(mark>=0){ var cut=ctx.indexOf("\n",mark); cut=cut<0?mark:cut+1;
        ctx=ctx.slice(0,cut)+'<span class="tail">'+ctx.slice(cut)+'</span>'; }
      var setlab = ex.set==="heldout" ? "HELD-OUT (unseen activation)" : "TRAINING (carries a warm-start target)";
      var h='<div class="exhead">'+setlab+' &middot; <span class="mono">doc '+esc(String(ex.doc_id).split(":").pop())+
            '</span> &middot; activation at token '+esc(ex.pos)+'</div>'+
            '<div class="ctx">'+ctx+'</div><div class="armgrid">';
      ARMORDER.forEach(function(k){
        var a=ex.arms[k]||{}, vc=vClass(a.verdict);
        h+='<div class="armcard" style="border-top-color:'+ARMC[k]+'">'+
             '<div class="top"><h4>'+esc(ARMLAB[k])+'</h4>'+
               '<span><span class="badge '+vc+'">'+esc(a.verdict||"?")+'</span></span></div>'+
             '<div class="style">'+(a.style?("style: "+esc(a.style)+"  ·  "):"")+'FVE '+(a.fve==null?"n/a":a.fve.toFixed(3))+'</div>';
        if(a.warmstart) h+='<div class="ws"><b>warm-start (t=0): </b>'+esc(a.warmstart)+'</div>';
        h+='<div class="gen">'+(ex.set==="train_warmstart"?'<b style="color:var(--faint);font-size:.78rem">post-RL (t=final): </b>':"")+esc(a.expl)+'</div>';
        if(a.confab&&a.confab.length){
          h+='<div class="confab"><span style="color:var(--faint);font-size:.78rem">flagged as unsupported by the context:</span>';
          a.confab.forEach(function(c){ h+='<span class="ch">'+esc(c)+'</span>'; });
          h+='</div>';
        }
        if(a.samples&&a.samples.length>1){
          h+='<details class="samples"><summary>all '+a.samples.length+' samples</summary>';
          a.samples.forEach(function(s,si){ h+='<div class="s">#'+(si+1)+
            ' (FVE '+(s.fve==null?"n/a":Number(s.fve).toFixed(3))+', '+(s.ntok||"?")+' tok): '+esc(s.expl)+'</div>'; });
          h+='</details>';
        }
        h+='</div>';
      });
      h+='</div>';
      host.innerHTML=h;
    };

    function exampleBrowser(D){
      var ho=[], tr=[];
      D.examples.forEach(function(ex,gi){
        var teach=(D.teaching||[]).some(function(t){return t.set===ex.set && t.i===ex.i;});
        var lab=(ex.set==="heldout"?"HO":"TR")+ex.i;
        var btn='<button class="navbtn'+(teach?" teach":"")+'" data-gi="'+gi+'" onclick="DV.show('+gi+')">'+lab+'</button>';
        (ex.set==="heldout"?ho:tr).push(btn);
      });
      return '<div class="navwrap">'+
        '<div class="navrow"><span class="navlab">Held-out</span>'+ho.join("")+'</div>'+
        '<div class="navrow"><span class="navlab">Training</span>'+tr.join("")+'</div>'+
        '<div class="legend-inline">&#9733; = teaching example. Click any to see the document and all four arms side by side.</div>'+
        '</div><div id="ex-detail"></div>';
    }

    // ---- eval-suite reproduction ----
    function tagPill(D,tag){
      var L=((D.eval_suite||{}).tag_legend||{})[tag]||{label:tag,color:"#888"};
      return '<span class="tagpill" style="background:'+L.color+'">'+esc(L.label)+'</span>';
    }
    function chipCls(v){ return v==="true"?"chip-true":(v==="false_related"?"chip-fr":"chip-fu"); }
    function fmtPct(x){ return (x==null?"n/a":Number(x).toFixed(1)+"%"); }
    function fmtCell(v,fmt){
      if(v==null) return "n/a";
      if(fmt==="pct") return fmtPct(v);
      if(fmt==="f3") return Number(v).toFixed(3);
      if(fmt==="f2") return Number(v).toFixed(2);
      if(fmt==="signed2") return (v>=0?"+":"")+Number(v).toFixed(2);
      if(fmt==="signed3") return (v>=0?"+":"")+Number(v).toFixed(3);
      return String(v);
    }
    function revalTable(D,r){
      var rows=r.table||[]; if(!rows.length) return "";
      var hl=function(k){return k==="arm3_evidence"?" class=\"hl\"":"";};
      var H='<table class="evtable">';
      if(r.columns){   // generic table: r.columns=[{key,label,fmt,bold}], first col is the row label
        H+='<thead><tr>'; r.columns.forEach(function(c,ci){ H+='<th'+(ci>0?' class="num"':'')+'>'+esc(c.label)+'</th>'; }); H+='</tr></thead><tbody>';
        rows.forEach(function(x){
          H+='<tr'+(x.arm?hl(x.arm):"")+'>';
          r.columns.forEach(function(c,ci){
            var v=x[c.key];
            if(ci===0){ H+='<td>'+(x.arm?'<span class="swatch" style="background:'+(ARMC[x.arm]||"#ccc")+'"></span>':"")+esc(String(v==null?"":v))+'</td>'; }
            else { var d=fmtCell(v,c.fmt); H+='<td class="num">'+(c.bold?'<b>'+d+'</b>':d)+(x[c.key+"_n"]!=null?'<span class="mono" style="color:var(--faint)"> n'+x[c.key+"_n"]+'</span>':"")+'</td>'; }
          });
          H+='</tr>';
        });
        H+='</tbody></table>'; return H;
      }
      if(r.key==="confab_specificity"){
        H+='<thead><tr><th>Arm</th><th class="num">Theme %true</th><th class="num">Entity %true</th><th class="num">Detail %true</th><th class="num">Overall %true</th><th class="num">claims/expl</th></tr></thead><tbody>';
        rows.forEach(function(x){ H+='<tr'+hl(x.arm)+'><td><span class="swatch" style="background:'+(ARMC[x.arm]||"#ccc")+'"></span>'+esc(x.label)+
          '</td><td class="num">'+fmtPct(x.theme)+'<span class="mono" style="color:var(--faint)"> n'+x.theme_n+'</span>'+
          '</td><td class="num">'+fmtPct(x.entity)+'<span class="mono" style="color:var(--faint)"> n'+x.entity_n+'</span>'+
          '</td><td class="num">'+fmtPct(x.detail)+'<span class="mono" style="color:var(--faint)"> n'+x.detail_n+'</span>'+
          '</td><td class="num"><b>'+fmtPct(x.overall)+'</b></td><td class="num">'+Number(x.claims).toFixed(2)+'</td></tr>'; });
      } else if(r.key==="writing_quality"){
        H+='<thead><tr><th>Arm</th><th class="num">Writing quality (0–100)</th></tr></thead><tbody>';
        rows.forEach(function(x){ H+='<tr'+hl(x.arm)+'><td><span class="swatch" style="background:'+(ARMC[x.arm]||"#ccc")+'"></span>'+esc(x.label)+
          '</td><td class="num">'+Number(x.wq).toFixed(1)+'</td></tr>'; });
      } else if(r.key==="eval_awareness"){
        H+='<thead><tr><th>Arm</th><th class="num">Sensitivity (eval)</th><th class="num">False-pos (deploy)</th><th class="num">Separation</th></tr></thead><tbody>';
        rows.forEach(function(x){ H+='<tr'+hl(x.arm)+'><td><span class="swatch" style="background:'+(ARMC[x.arm]||"#ccc")+'"></span>'+esc(x.label)+
          '</td><td class="num">'+Number(x.sensitivity).toFixed(2)+'</td><td class="num">'+Number(x.fpr).toFixed(2)+
          '</td><td class="num"><b>'+(x.separation>=0?"+":"")+Number(x.separation).toFixed(2)+'</b></td></tr>'; });
      } else if(r.key==="suffix_prediction"){
        H+='<thead><tr><th>Arm</th><th class="num">10-way accuracy</th><th class="num">vs chance</th></tr></thead><tbody>';
        rows.forEach(function(x){ H+='<tr'+hl(x.arm)+'><td><span class="swatch" style="background:'+(ARMC[x.arm]||"#ccc")+'"></span>'+esc(x.label)+
          '</td><td class="num"><b>'+Number(x.accuracy).toFixed(2)+'</b></td><td class="num" style="color:var(--faint)">0.10</td></tr>'; });
      }
      H+='</tbody></table>';
      return H;
    }
    function revalExamples(D,r){
      var ex=r.examples||[]; if(!ex.length) return "";
      var H='<details class="samples"><summary>'+esc(r.examples_label||("example explanations ("+ex.length+")"))+'</summary>';
      if(r.gen_examples){   // generic: ex=[{badge,badgecls,title,sub,blocks:[{label,text}]}]
        ex.forEach(function(b){
          H+='<div class="exclaims">';
          if(b.badge) H+='<span class="framebadge '+(b.badgecls||"fb-eval")+'">'+esc(b.badge)+'</span> ';
          if(b.title) H+='<span class="mono" style="font-size:.82rem">'+esc(b.title)+'</span>';
          if(b.sub) H+='<div style="font-size:.86rem;color:var(--muted);margin:.3em 0">'+esc(b.sub)+'</div>';
          (b.blocks||[]).forEach(function(bl){ H+='<div class="exclaim-arm"><div class="alab">'+esc(bl.label)+'</div><div style="font-size:.92rem">'+esc(bl.text)+'</div></div>'; });
          H+='</div>';
        });
        H+='</details>'; return H;
      }
      if(r.key==="confab_specificity"){
        ex.forEach(function(b){
          H+='<div class="exclaims"><div class="alab mono">'+esc(b.key)+'</div>';
          ARMORDER.forEach(function(k){
            var cl=(b.arms||{})[k]; if(!cl||!cl.length) return;
            H+='<div class="exclaim-arm"><div class="alab">'+esc(ARMLAB[k])+'</div>';
            cl.forEach(function(c){ H+='<span class="chip '+chipCls(c.verdict)+'"><span class="sp">'+esc(c.specificity)+'</span>'+esc(c.text)+'</span>'; });
            H+='</div>';
          });
          H+='</div>';
        });
      } else if(r.key==="eval_awareness"){
        ex.forEach(function(b){
          H+='<div class="exclaims"><span class="framebadge '+(b.frame==="eval"?"fb-eval":"fb-deploy")+'">'+esc(b.frame)+'</span> '+
             '<span class="mono" style="font-size:.82rem">'+esc(b.id)+'</span><div class="ctx" style="max-height:90px;margin:.4em 0">'+esc(b.prompt)+'</div>';
          ARMORDER.forEach(function(k){ var t=(b.arms||{})[k]||""; H+='<div class="exclaim-arm"><div class="alab">'+esc(ARMLAB[k])+'</div><div style="font-size:.92rem">'+esc(t)+'</div></div>'; });
          H+='</div>';
        });
      } else if(r.key==="suffix_prediction"){
        ex.forEach(function(b){
          H+='<div class="exclaims"><span class="mono" style="font-size:.82rem">'+esc(b.id)+' · '+esc(b.domain||"")+'</span>'+
             '<div style="font-size:.86rem;color:var(--muted);margin:.3em 0"><b>true continuation:</b> <span class="mono">'+esc(b.true_suffix)+'</span></div>';
          ARMORDER.forEach(function(k){ var t=(b.arms||{})[k]||""; H+='<div class="exclaim-arm"><div class="alab">'+esc(ARMLAB[k])+'</div><div style="font-size:.92rem">'+esc(t)+'</div></div>'; });
          H+='</div>';
        });
      }
      H+='</details>';
      return H;
    }
    function revalCard(D,r){
      var h='<div class="reval"><div class="ev-head"><span>'+esc(r.paper)+'</span> <span class="mono" style="color:var(--faint);font-size:.82rem">'+esc(r.pages)+'</span> '+tagPill(D,r.tag)+'</div>';
      h+='<p class="ev-what">'+esc(r.what)+'</p>';
      h+='<div class="ev-headline">'+esc(r.headline)+'</div>';
      if(r.metric) h+='<div class="ev-metric"><b>Metric.</b> '+esc(r.metric)+'</div>';
      h+=revalTable(D,r);
      if(r.caveat) h+='<div class="ev-metric" style="font-style:italic"><b>Caveat.</b> '+esc(r.caveat)+'</div>';
      h+=revalExamples(D,r);
      return h+'</div>';
    }
    function evalSuite(D){
      var E=D.eval_suite; if(!E) return "";
      var s=E.summary;
      var h='<p class="sec-sub">'+esc(E.intro)+'</p>';
      h+='<div class="panel"><b>'+s.total+'</b> evaluations catalogued &middot; <b>'+s.reproduced_here+'</b> reproduced here on the open arms &middot; <b>'+s.already_on_site+'</b> already shown above.<div style="margin-top:.7em;line-height:2">';
      Object.keys(E.tag_legend).forEach(function(t){ h+=tagPill(D,t)+' <span class="mono" style="margin:0 1.1em 0 .2em">'+(s.tag_counts[t]||0)+'</span>'; });
      h+='</div></div>';
      h+='<h3 class="subh">Reproduced on the four arms</h3>';
      E.reproduced.forEach(function(r){ h+=revalCard(D,r); });
      if(E.reproduced_hosted && E.reproduced_hosted.length){
        h+='<h3 class="subh">Reproduced on the hosted Llama-3.3-70B NLA</h3>';
        if(E.hosted_intro) h+='<p class="sec-sub">'+esc(E.hosted_intro)+'</p>';
        E.reproduced_hosted.forEach(function(r){ h+=revalCard(D,r); });
      }
      if(E.organism_gap){
        var g=E.organism_gap;
        h+='<h3 class="subh">'+esc(g.title)+'</h3><div class="panel">';
        (g.paras||[]).forEach(function(p){ h+='<p style="margin:.5em 0">'+esc(p)+'</p>'; });
        if(g.links&&g.links.length){ h+='<div style="margin-top:.6em;font-size:.9rem">'; g.links.forEach(function(l){ h+='<div style="margin:.2em 0">&rsaquo; <a href="'+esc(l.url)+'" target="_blank" rel="noopener">'+esc(l.label)+'</a></div>'; }); h+='</div>'; }
        h+='</div>';
      }
      h+='<h3 class="subh">Already shown above (also paper evals)</h3><div class="panel"><ul class="clean">';
      E.already_on_site.forEach(function(a){ h+='<li><b>'+esc(a.paper)+'</b> <span class="mono" style="color:var(--faint)">'+esc(a.pages)+'</span> &rarr; see &ldquo;'+esc(a.ref)+'&rdquo; above. '+esc(a.note)+'</li>'; });
      h+='</ul></div>';
      h+='<h3 class="subh">The full catalog &mdash; all '+s.total+' paper evaluations</h3>'+
         '<p class="sec-sub">Every evaluation, case study, and experiment in the paper, with the reproducibility verdict for our open-model resources.</p>';
      h+='<div class="panel">';
      Object.keys(E.tag_legend).forEach(function(t){ var L=E.tag_legend[t]; h+='<div style="margin:.35em 0">'+tagPill(D,t)+' <span style="color:var(--muted);font-size:.9rem;margin-left:.4em">'+esc(L.desc)+'</span></div>'; });
      h+='</div>';
      E.catalog.forEach(function(sec){
        h+='<div class="catsec">'+esc(sec.section)+' <span class="mono" style="color:var(--faint);font-weight:400;font-size:.82rem">pp. '+esc(sec.pages)+'</span></div>';
        sec.evals.forEach(function(e){
          h+='<div class="catrow"><div class="cn">'+esc(e.name)+(e.purpose?'<div class="cwhy">'+esc(e.purpose)+'</div>':'')+'</div>'+
             '<div class="cp mono">p.'+esc(e.pages)+'</div><div class="ct">'+tagPill(D,e.tag)+'</div></div>';
        });
      });
      return h;
    }

    function render(){
      var D=window.DECONF;
      var app=document.getElementById("app");
      if(!D){ if(app) app.innerHTML='<p class="err">deconf_data.js failed to load (window.DECONF missing).</p>'; return; }
      (D.arms||[]).forEach(function(a){ ARMC[a.key]=a.color; ARMLAB[a.key]=a.label; ARMORDER.push(a.key); });

      var H="";
      // header
      H+='<h1>'+esc(D.meta.title)+'</h1>'+
         '<p class="subtitle">'+esc(D.meta.subtitle)+'</p>'+
         '<p class="meta-line"><span>'+esc(D.meta.date)+'</span><span>base '+esc(D.meta.base_model)+'</span>'+
           '<span>layer '+esc(D.meta.layer)+'</span><span>4 arms &middot; 4&times;H100</span></p>';
      H+='<div class="headline">'+esc(D.meta.headline).replace(/0\.917/,"<b>0.917</b>")+
         '<div class="qbox">Headline question: '+esc(D.meta.question)+'</div></div>';

      // arms legend
      H+='<h2><span class="num">·</span>The four arms</h2>'+
         '<p class="sec-sub">All arms share the same activations and the same training pipeline. They differ only in the source of the warm-start summary.</p><div class="legend">';
      D.arms.forEach(function(a){
        H+='<div class="arm" style="border-top-color:'+a.color+'"><h4>'+esc(a.label)+
           '</h4><p><span class="arm-tag">'+esc(a.tag)+'</span><br>'+esc(a.blurb)+'</p></div>';
      });
      H+='</div>';
      H+='<div class="panel" style="margin-top:14px"><ul class="clean">'+
         D.design.map(function(d){return "<li>"+esc(d)+"</li>";}).join("")+'</ul></div>';

      // how each arm is trained
      H+='<h2><span class="num">1.</span>How each arm is trained</h2>'+trainingDetail(D);

      // tests run
      H+='<h2><span class="num">2.</span>Tests run</h2>'+
         '<table><thead><tr><th>Test</th><th>What it did</th><th>Result</th></tr></thead><tbody>'+
         D.tests.map(function(t){return "<tr><td><b>"+esc(t.name)+"</b></td><td>"+esc(t.what)+"</td><td>"+esc(t.result)+"</td></tr>";}).join("")+
         '</tbody></table>';

      // training
      H+='<h2><span class="num">3.</span>Training results: 4 arms through 500 RL steps</h2>'+
         '<p class="sec-sub">'+esc(D.training.note)+'</p>';
      H+='<table><thead><tr><th>Arm</th><th class="num">FVE (final-30)</th><th class="num">reward</th><th class="num">KL</th><th class="num">held-out FVE</th></tr></thead><tbody>'+
         D.training.end_state.map(function(r){
           return '<tr><td><span class="swatch" style="background:'+ARMC[r.arm]+'"></span>'+esc(ARMLAB[r.arm])+
             '</td><td class="num">'+r.fve.toFixed(1)+'%</td><td class="num">'+r.reward.toFixed(3)+
             '</td><td class="num">'+r.kl.toFixed(3)+'</td><td class="num">'+r.heldout_fve.toFixed(3)+'</td></tr>';
         }).join("")+'</tbody></table>';
      H+='<div class="panel">'+lineChart(D)+'<div class="clegend">'+
         ARMORDER.map(function(k){return '<span><span class="swatch" style="background:'+ARMC[k]+'"></span>'+esc(ARMLAB[k])+'</span>';}).join("")+
         '</div></div>';

      // grounded-rate
      H+='<h2><span class="num">4.</span>Grounded-rate (independently judged + adversarially audited)</h2>'+
         '<p class="sec-sub">A 23-agent workflow scored every generation against the real document: 18 independent judges, then one adversarial auditor per arm to catch false-positive and false-negative confabulation flags. n = 18 examples per arm.</p>'+
         '<div class="panel"><div class="bars">'+bars(D)+'</div></div>';

      // eval-suite reproduction
      if(D.eval_suite){
        H+='<h2><span class="num">5.</span>NLA paper eval-suite reproduction</h2>'+evalSuite(D);
      }

      // findings
      H+='<h2><span class="num">6.</span>Findings</h2>';
      D.findings.forEach(function(f){ H+='<div class="find"><h3>'+esc(f.title)+'</h3><p>'+esc(f.body)+'</p></div>'; });

      // example browser
      H+='<h2><span class="num">7.</span>The examples</h2>'+
         '<p class="sec-sub">Every probe example: the document the model was reading, and all four arms&#39; explanations of the same injected activation, with the audited verdict, the explanation style, the FVE, the verbatim claims flagged as unsupported, and all four sampled generations.</p>'+
         exampleBrowser(D);

      // teaching callouts
      H+='<h2><span class="num">8.</span>Teaching cases</h2><div class="panel"><ul class="clean">'+
         D.teaching.map(function(t){var lab=(t.set==="heldout"?"HO":"TR")+t.i;
           return '<li><b>'+esc(t.title)+'</b> ('+lab+'): '+esc(t.note)+'</li>';}).join("")+'</ul></div>';

      // synthesis
      H+='<h2><span class="num">9.</span>What it means</h2><div class="panel"><ul class="clean">'+
         D.synthesis_points.map(function(s){return "<li>"+esc(s)+"</li>";}).join("")+'</ul></div>';

      // caveats + next
      H+='<h2><span class="num">10.</span>Caveats &amp; next steps</h2>'+
         '<div class="armgrid"><div class="panel"><h3 style="margin-top:0;font-size:1.1rem">Honest caveats</h3><ul class="clean">'+
           D.caveats.map(function(c){return "<li>"+esc(c)+"</li>";}).join("")+'</ul></div>'+
         '<div class="panel"><h3 style="margin-top:0;font-size:1.1rem">Next steps</h3><ul class="clean">'+
           D.nextsteps.map(function(c){return "<li>"+esc(c)+"</li>";}).join("")+'</ul></div></div>';

      H+='<footer>NLA de-confabulation experiment &middot; '+esc(D.meta.date)+
         ' &middot; rendered client-side, no tracking &middot; data: <span class="mono">deconf_data.js</span></footer>';

      app.innerHTML=H;
      // default to the first teaching example
      var first=0; (D.teaching&&D.teaching[0]) && D.examples.forEach(function(ex,gi){
        if(ex.set===D.teaching[0].set && ex.i===D.teaching[0].i) first=gi; });
      DV.show(first);
    }

    DV.render=render;
    try { render(); }
    catch(e){ var app=document.getElementById("app"); if(app) app.innerHTML='<p class="err">render error: '+esc(e&&e.stack||e)+'</p>'; }
  })();
  </script>
</body>
</html>
